<!DOCTYPE html>
<html lang="nl-BE">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ω Omega">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23000'/><text x='50' y='76' text-anchor='middle' font-family='system-ui,sans-serif' font-size='76' font-weight='900' fill='%23f0a500'>&#937;</text></svg>">
<link rel="apple-touch-icon" href="/omega-icon.svg">
<title>Ω Omega Tracker</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  /* ── Dark (default) ── */
  --bg:#000;--bg2:#0a0a0a;--bg3:#111;
  --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f5f5f7;--text2:rgba(245,245,247,0.55);--text3:rgba(245,245,247,0.35);
  --gold:#f0a500;--gold2:#ffd060;
  --green:#30d158;--blue:#0a84ff;--red:#ff453a;--purple:#bf5af2;
  --nav-bg:rgba(0,0,0,0.75);--modal-bg:#141414;--input-bg:rgba(255,255,255,0.05);
  --scrollbar:rgba(255,255,255,0.15);
  --font:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Segoe UI',sans-serif;
  /* Money bag SVG tokens */
  --bag-stop1:rgba(255,255,255,0.08);--bag-stop2:rgba(255,255,255,0.02);
  --bag-neck:rgba(255,255,255,0.07);--bag-knot:rgba(255,255,255,0.08);
  --bag-stroke:rgba(240,165,0,0.38);
}
/* ── Light mode ─────────────────────────────────────────────── */
html[data-theme="light"]{
  --bg:#f2f2f7;--bg2:#ffffff;--bg3:#e5e5ea;
  --surface:rgba(0,0,0,0.04);--surface2:rgba(0,0,0,0.08);
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1c1c1e;--text2:rgba(60,60,67,0.65);--text3:rgba(60,60,67,0.38);
  --green:#34c759;--blue:#007aff;--red:#ff3b30;--purple:#af52de;
  --nav-bg:rgba(242,242,247,0.82);--modal-bg:#ffffff;--input-bg:rgba(0,0,0,0.04);
  --scrollbar:rgba(0,0,0,0.18);
  /* Money bag SVG tokens – light */
  --bag-stop1:rgba(0,0,0,0.05);--bag-stop2:rgba(0,0,0,0.02);
  --bag-neck:rgba(0,0,0,0.06);--bag-knot:rgba(0,0,0,0.08);
  --bag-stroke:rgba(200,130,0,0.55);
}
/* Light-mode specific overrides */
html[data-theme="light"] .nav{border-bottom-color:rgba(0,0,0,0.1)}
html[data-theme="light"] .modal{box-shadow:0 20px 80px rgba(0,0,0,0.18)}
html[data-theme="light"] .card{box-shadow:0 2px 12px rgba(0,0,0,0.06)}
html[data-theme="light"] .stat-card{box-shadow:0 2px 12px rgba(0,0,0,0.06)}
html[data-theme="light"] .week-day{box-shadow:0 1px 6px rgba(0,0,0,0.05)}
html[data-theme="light"] .toast{background:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
html[data-theme="light"] .milestone-toast{background:linear-gradient(135deg,#fff8e6,#fff3cc)}
html[data-theme="light"] .auth-card{background:#fff;box-shadow:0 20px 80px rgba(0,0,0,0.12)}
html[data-theme="light"] .invoice-box{background:#f8f8fa}
html[data-theme="light"] ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.18)}
html[data-theme="light"] .nav-logo{background:linear-gradient(90deg,#1c1c1e 0%,var(--gold) 25%,#5a3e00 50%,var(--gold) 75%,#1c1c1e 100%);background-size:300% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:logo-shine 4s ease-in-out infinite}
html[data-theme="light"] .loading-omega{background:linear-gradient(90deg,#1c1c1e 0%,var(--gold) 25%,#5a3e00 50%,var(--gold) 75%,#1c1c1e 100%);background-size:300% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
html[data-theme="light"] .auth-logo{background:linear-gradient(90deg,#1c1c1e 0%,var(--gold) 25%,#5a3e00 50%,var(--gold) 75%,#1c1c1e 100%);background-size:300% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:logo-shine 4s ease-in-out infinite}
html[data-theme="light"] .fun-badge.badge-fire{background:rgba(255,149,0,0.08)}
html[data-theme="light"] .fun-badge.badge-level{background:rgba(175,82,222,0.08)}
html[data-theme="light"] .fun-badge.badge-record{background:rgba(52,199,89,0.08)}
html[data-theme="light"] .fun-badge.badge-ship{background:rgba(0,122,255,0.08)}

html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%}
input[type="time"]::-webkit-datetime-edit-ampm-field{display:none !important;width:0;overflow:hidden}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:calc(52px + env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;
  padding-top:env(safe-area-inset-top);
  padding-left:max(32px, env(safe-area-inset-left));
  padding-right:max(32px, env(safe-area-inset-right));
  background:var(--nav-bg);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-size:20px;font-weight:700;letter-spacing:-0.5px;
  background:linear-gradient(90deg,var(--gold) 0%,var(--gold2) 25%,#fff 50%,var(--gold2) 75%,var(--gold) 100%);
  background-size:300% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  cursor:default;user-select:none;
  animation:logo-shine 4s ease-in-out infinite;
}
.nav-tabs{display:flex;gap:2px;background:var(--surface);border-radius:10px;padding:3px}
.nav-tab{
  padding:5px 16px;border-radius:7px;border:none;background:transparent;
  color:var(--text2);font-size:13px;font-family:var(--font);font-weight:500;
  cursor:pointer;transition:background .2s ease, color .2s ease;letter-spacing:-0.1px;
}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{background:var(--surface2);color:var(--text)}
.nav-right{display:flex;align-items:center;gap:12px}
.btn{
  padding:7px 18px;border-radius:20px;border:none;
  font-size:13px;font-family:var(--font);font-weight:600;
  cursor:pointer;transition:background .18s ease, transform .15s ease, box-shadow .18s ease, color .15s ease;letter-spacing:-0.1px;
}
.btn-primary{
  background:var(--gold);color:#000;
  box-shadow:0 0 20px rgba(240,165,0,0.25);
}
.btn-primary:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 4px 24px rgba(240,165,0,0.4)}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:rgba(255,69,58,0.15);color:var(--red);border:1px solid rgba(255,69,58,0.2)}
.btn-danger:hover{background:rgba(255,69,58,0.25)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:14px}

/* LAYOUT */
.page{
  padding:calc(80px + env(safe-area-inset-top)) max(32px, env(safe-area-inset-right)) calc(48px + env(safe-area-inset-bottom)) max(32px, env(safe-area-inset-left));
  max-width:1200px;margin:0 auto;
}
.section-title{font-size:28px;font-weight:700;letter-spacing:-0.8px;margin-bottom:6px}
.section-sub{font-size:14px;color:var(--text2);margin-bottom:28px}

/* HERO GRID */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
/* Two-column responsive grid (bag+belasting, top-ships+top-locs) */
.two-col-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
.q-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stats-top-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:900px){.stats-top-grid{grid-template-columns:1fr}}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:18px;
  padding:22px 24px 20px;
  transition:transform .28s ease, background .22s ease, border-color .22s ease, box-shadow .28s ease;
  cursor:default;position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;inset:0;border-radius:18px;
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 60%);
  pointer-events:none;
}
.stat-card:hover{transform:translateY(-2px);border-color:var(--border2);background:var(--surface2);box-shadow:0 6px 22px rgba(0,0,0,0.22)}
.stat-label{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:10px}
.stat-value{font-size:32px;font-weight:700;letter-spacing:-1.5px;line-height:1}
.stat-sub{font-size:12px;color:var(--text3);margin-top:8px}
.stat-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;margin-top:8px;
}
.badge-gold{background:rgba(240,165,0,0.15);color:var(--gold)}
.badge-green{background:rgba(48,209,88,0.12);color:var(--green)}
.badge-blue{background:rgba(10,132,255,0.12);color:var(--blue)}
.badge-purple{background:rgba(191,90,242,0.12);color:var(--purple)}
.badge-red{background:rgba(255,69,58,0.12);color:var(--red)}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
@media(max-width:768px){.two-col{grid-template-columns:1fr}}
.three-col{display:grid;grid-template-columns:360px 1fr;gap:14px;margin-bottom:28px}
@media(max-width:900px){.three-col{grid-template-columns:1fr}}

/* CARD */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:24px;position:relative;overflow:hidden;
}
.card-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;margin-bottom:16px;color:var(--text)}
.card-title span{color:var(--text2);font-weight:400;font-size:13px;margin-left:8px}

/* GOAL RING */
.goal-ring-wrap{display:flex;align-items:center;gap:28px}
.ring-svg{flex-shrink:0}
.ring-stats{flex:1}
.ring-stat{margin-bottom:14px}
.ring-stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px}
.ring-stat-value{font-size:22px;font-weight:700;letter-spacing:-0.8px}
.ring-stat-sub{font-size:12px;color:var(--text3);margin-top:2px}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .6s ease}

/* CHART */
.chart-wrap{display:flex;align-items:flex-end;gap:6px;height:120px;padding-bottom:24px;position:relative}
.chart-bar-group{display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;position:relative;height:100%}
.chart-bar-inner{display:flex;gap:2px;align-items:flex-end;width:100%;height:calc(100% - 20px)}
.chart-bar{
  flex:1;border-radius:4px 4px 0 0;min-height:2px;
  transition:height .5s ease;cursor:default;
  position:relative;
}
.chart-bar.weekday{background:linear-gradient(180deg,var(--gold),rgba(var(--gold-rgb),.55))}
.chart-bar.weekend{background:linear-gradient(180deg,var(--blue),rgba(10,132,255,.55))}
.chart-bar:hover::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:rgba(30,30,30,0.95);color:#fff;font-size:11px;padding:4px 8px;border-radius:6px;
  white-space:nowrap;pointer-events:none;z-index:10;border:1px solid var(--border2);
}
.chart-month-label{font-size:10px;color:var(--text3);margin-top:6px;text-align:center;position:absolute;bottom:0;width:100%}
.chart-legend{display:flex;gap:16px;margin-bottom:16px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:2px}

/* ENTRY TABLE */
.entry-table{width:100%;border-collapse:collapse}
.entry-table th{
  font-size:11px;color:var(--text3);font-weight:500;letter-spacing:0.4px;
  text-transform:uppercase;padding:0 12px 10px;text-align:left;
}
.entry-table td{
  padding:11px 12px;font-size:13px;border-top:1px solid var(--border);
  vertical-align:middle;
}
.entry-table tr:hover td{background:var(--surface)}
.entry-table tr:first-child td{border-top:none}
.job-tag{
  display:inline-flex;align-items:center;padding:3px 9px;border-radius:10px;
  font-size:11px;font-weight:600;letter-spacing:0.2px;
}
.job-lossen{background:rgba(48,209,88,0.1);color:var(--green)}
.job-laden{background:rgba(10,132,255,0.1);color:var(--blue)}
.job-robot{background:rgba(191,90,242,0.1);color:var(--purple)}
.day-tag{font-size:11px;color:var(--text2);font-weight:500}
.entry-earnings{font-size:14px;font-weight:600;letter-spacing:-0.3px}
.entry-earnings.weekend{color:var(--gold)}
.entry-hours{font-size:13px;color:var(--text2)}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  padding:max(20px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) max(20px,env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-left));
  animation:fadeIn .15s ease;overflow-y:auto;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:#141414;border:1px solid var(--border2);border-radius:24px;
  padding:32px;width:100%;max-width:520px;
  animation:slideUp .2s ease;
  box-shadow:0 40px 100px rgba(0,0,0,0.8);
  max-height:90dvh;overflow-y:auto;overscroll-behavior:contain;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:22px;font-weight:700;letter-spacing:-0.6px;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:0.2px;text-transform:uppercase}
.input{
  background:var(--input-bg);border:1px solid var(--border2);
  border-radius:10px;padding:10px 14px;color:var(--text);
  font-size:16px;font-family:var(--font);outline:none;
  transition:border-color .15s;width:100%;
}
.input:focus{border-color:var(--gold)}
.input option{background:#1a1a1a;color:#fff}
.calc-preview{
  background:rgba(240,165,0,0.06);border:1px solid rgba(240,165,0,0.15);
  border-radius:12px;padding:14px 16px;margin-top:4px;
}
.calc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px}
.calc-row:last-child{margin-bottom:0;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06);font-weight:600;font-size:15px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}

/* HISTORY FILTER */
.filter-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-select{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:7px 12px;color:var(--text);
  font-size:13px;font-family:var(--font);outline:none;cursor:pointer;
}
.filter-select:focus{border-color:var(--gold)}
.search-input{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:7px 14px;color:var(--text);
  font-size:13px;font-family:var(--font);outline:none;flex:1;min-width:180px;
}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--text3)}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.4}
.empty-title{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text)}
.empty-sub{font-size:13px;color:var(--text3)}

/* RECENT */
.recent-row{
  display:flex;align-items:center;gap:14px;padding:12px 0;
  border-bottom:1px solid var(--border);
}
.recent-row:last-child{border-bottom:none}
.recent-dot{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.recent-dot.lossen{background:rgba(48,209,88,0.1);color:var(--green)}
.recent-dot.laden{background:rgba(10,132,255,0.1);color:var(--blue)}
.recent-dot.robot{background:rgba(191,90,242,0.1);color:var(--purple)}
.recent-main{flex:1;min-width:0}
.recent-comment{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.recent-meta{font-size:11px;color:var(--text2);margin-top:2px}
.recent-amount{font-size:15px;font-weight:700;letter-spacing:-0.4px;color:var(--gold)}

/* WEEKLY */
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.week-nav{display:flex;align-items:center;gap:14px}
.week-nav-btn{
  background:var(--surface);border:1px solid var(--border2);border-radius:8px;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);transition:all .15s;font-size:16px;
}
.week-nav-btn:hover{background:var(--surface2);color:var(--text)}
.week-day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.week-day{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 8px;min-height:80px}
.week-day.has-work{border-color:rgba(240,165,0,0.25);background:rgba(240,165,0,0.04)}
.week-day-name{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px}
.week-day-date{font-size:13px;font-weight:600;margin-bottom:8px}
.week-day-entry{font-size:10px;color:var(--text2);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.week-day-earn{font-size:12px;font-weight:600;color:var(--gold);margin-top:4px}
@media(max-width:700px){.week-day-grid{grid-template-columns:repeat(4,1fr)}}

/* SETTINGS */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.setting-field{display:flex;flex-direction:column;gap:6px}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:24px 0}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1c1c1e;border:1px solid var(--border2);border-radius:14px;
  padding:12px 20px;font-size:13px;font-weight:500;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);z-index:300;
  animation:toastIn .2s ease;display:flex;align-items:center;gap:10px;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* SECTION HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.page-header-left{}

/* INVOICE TEXT */
.invoice-box{
  background:#0a0a0a;border:1px solid rgba(240,165,0,0.2);
  border-radius:12px;padding:16px 18px;margin-top:16px;
  font-family:'Courier New',Courier,monospace;font-size:12px;
  line-height:1.7;color:var(--text2);white-space:pre-wrap;word-break:break-all;
  max-height:220px;overflow-y:auto;
}
.invoice-header{color:var(--gold);font-weight:700;font-size:11px;letter-spacing:0.5px}
.copy-bar{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.copy-btn{
  background:rgba(240,165,0,0.1);border:1px solid rgba(240,165,0,0.2);
  color:var(--gold);border-radius:8px;padding:6px 14px;
  font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);
  transition:all .15s;
}
.copy-btn:hover{background:rgba(240,165,0,0.2)}
.copy-btn.copied{background:rgba(48,209,88,0.1);border-color:rgba(48,209,88,0.2);color:var(--green)}

/* GLOW accent */
.accent-glow{color:var(--gold)}

/* ── ANIMATIONS ──────────────────────────────────────────────────── */
@keyframes slideInCard{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes logo-shine{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes bounce-in{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.07)}100%{transform:scale(1);opacity:1}}
@keyframes pulse-gold{0%,100%{filter:drop-shadow(0 0 0px rgba(240,165,0,0))}50%{filter:drop-shadow(0 0 18px rgba(240,165,0,0.75))}}
@keyframes wave-slide{0%{transform:translateX(0)}100%{transform:translateX(-80px)}}
@keyframes float-orb{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer-bg{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pop-in{0%{transform:scale(0);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes glow-ring{0%,100%{box-shadow:0 0 0 0 rgba(240,165,0,0.0)}50%{box-shadow:0 0 32px 8px rgba(240,165,0,0.22)}}

.stat-card{animation:slideInCard .5s ease forwards}
.stat-card:nth-child(1){animation-delay:.06s}
.stat-card:nth-child(2){animation-delay:.12s}
.stat-card:nth-child(3){animation-delay:.18s}
.stat-card:nth-child(4){animation-delay:.24s}

/* ── FUN BADGES ─────────────────────────────────────────────────── */
.fun-badges-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.fun-badge{
  display:inline-flex;align-items:center;gap:7px;padding:9px 16px;
  border-radius:14px;font-size:13px;font-weight:600;border:1px solid;
  cursor:default;transition:transform .15s,box-shadow .15s;
  animation:bounce-in .5s cubic-bezier(.34,1.56,.64,1) both;
  white-space:nowrap;
}
.fun-badge:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.badge-fire{background:rgba(255,149,0,0.1);border-color:rgba(255,149,0,0.3);color:#ff9500}
.badge-fire:hover{box-shadow:0 4px 20px rgba(255,149,0,0.2)}
.badge-level{background:rgba(191,90,242,0.1);border-color:rgba(191,90,242,0.3);color:var(--purple)}
.badge-level:hover{box-shadow:0 4px 20px rgba(191,90,242,0.2)}
.badge-record{background:rgba(48,209,88,0.1);border-color:rgba(48,209,88,0.3);color:var(--green)}
.badge-record:hover{box-shadow:0 4px 20px rgba(48,209,88,0.2)}
.badge-ship{background:rgba(10,132,255,0.1);border-color:rgba(10,132,255,0.3);color:var(--blue)}
.badge-ship:hover{box-shadow:0 4px 20px rgba(10,132,255,0.2)}

/* ── MONEY BAG ──────────────────────────────────────────────────── */
.bag-container{display:flex;align-items:center;gap:28px;padding:4px 0}
.bag-svg-wrap{flex-shrink:0;animation:float-orb 4s ease-in-out infinite}
.bag-ring-stats{flex:1;display:flex;flex-direction:column;gap:14px}
.goal-complete-stroke{animation:pulse-gold 1.8s ease-in-out infinite}

/* ── STATS PAGE ─────────────────────────────────────────────────── */
.rank-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid var(--border);
  transition:background .15s;
}
.rank-row:last-child{border-bottom:none}
.rank-num{
  width:26px;height:26px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;
}

/* ── AUTH SCREEN ────────────────────────────────────────────────── */
.auth-page{
  min-height:100dvh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(240,165,0,0.07) 0%, transparent 70%), var(--bg);
  padding:max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
}
.auth-card{
  width:100%;max-width:400px;
  background:var(--modal-bg);border:1px solid var(--border2);border-radius:28px;
  padding:40px 36px 36px;
  box-shadow:0 40px 120px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.03);
  animation:slideInCard .35s ease both;
}
.auth-logo{
  font-size:36px;font-weight:800;letter-spacing:-1.5px;text-align:center;margin-bottom:6px;
  background:linear-gradient(90deg,var(--gold) 0%,var(--gold2) 25%,#fff 50%,var(--gold2) 75%,var(--gold) 100%);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logo-shine 4s ease-in-out infinite;
}
.auth-tagline{font-size:13px;color:var(--text3);text-align:center;margin-bottom:32px}
.auth-tabs{display:flex;background:var(--surface);border-radius:12px;padding:3px;margin-bottom:28px}
.auth-tab{
  flex:1;padding:8px;border-radius:9px;border:none;
  font-size:13px;font-family:var(--font);font-weight:600;cursor:pointer;transition:all .18s;
  background:transparent;color:var(--text2);
}
.auth-tab.active{background:var(--surface2);color:var(--text)}
.auth-field{margin-bottom:14px}
.auth-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:6px;display:block}
.auth-input{
  width:100%;background:var(--input-bg);border:1px solid var(--border2);
  border-radius:12px;padding:12px 16px;color:var(--text);
  font-size:16px;font-family:var(--font);outline:none;transition:border-color .15s;
}
.auth-input:focus{border-color:var(--gold)}
.auth-submit{
  width:100%;padding:14px;border-radius:14px;border:none;
  background:var(--gold);color:#000;font-size:15px;font-family:var(--font);
  font-weight:700;cursor:pointer;margin-top:6px;letter-spacing:-0.2px;
  transition:all .18s;box-shadow:0 4px 24px rgba(240,165,0,0.3);
}
.auth-submit:hover:not(:disabled){background:var(--gold2);transform:translateY(-1px);box-shadow:0 8px 32px rgba(240,165,0,0.45)}
.auth-submit:disabled{opacity:0.5;cursor:not-allowed}
.auth-error{
  background:rgba(255,69,58,0.1);border:1px solid rgba(255,69,58,0.2);
  color:var(--red);border-radius:10px;padding:10px 14px;font-size:13px;
  margin-bottom:14px;animation:slideInCard .2s ease;
}
.auth-footer{text-align:center;margin-top:20px;font-size:12px;color:var(--text3)}

/* ── LOADING SCREEN ─────────────────────────────────────────────── */
.loading-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:18px;background:var(--bg);
}
.loading-omega{
  font-size:52px;font-weight:800;letter-spacing:-2px;
  background:linear-gradient(90deg,var(--gold) 0%,var(--gold2) 25%,#fff 50%,var(--gold2) 75%,var(--gold) 100%);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:spin-slow 3s linear infinite,logo-shine 2s ease-in-out infinite;display:inline-block;
}

/* ── NAV IMPORT LABEL ───────────────────────────────────────────── */
.nav-file-btn{
  padding:5px 12px;border-radius:14px;border:1px solid var(--border2);
  font-size:12px;font-family:var(--font);font-weight:600;
  cursor:pointer;transition:all .18s;background:var(--surface);color:var(--text);
  display:inline-flex;align-items:center;gap:5px;
}
.nav-file-btn:hover{background:var(--surface2)}
.nav-user{font-size:12px;color:var(--text2);padding:5px 10px}

/* ── MILESTONE TOAST ────────────────────────────────────────────── */
@keyframes milestone-in{0%{transform:translateX(-50%) scale(0.7) translateY(20px);opacity:0}70%{transform:translateX(-50%) scale(1.04) translateY(0)}100%{transform:translateX(-50%) scale(1) translateY(0);opacity:1}}
.milestone-toast{
  position:fixed;bottom:80px;left:50%;
  background:linear-gradient(135deg,#1c1400,#1a0a00);
  border:1px solid rgba(240,165,0,0.4);border-radius:18px;
  padding:16px 24px;font-size:14px;font-weight:600;
  box-shadow:0 8px 48px rgba(240,165,0,0.25);z-index:400;
  animation:milestone-in .4s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:12px;color:var(--gold);
}

/* ── Settings sections ──────────────────────────────────────────── */
.settings-section{margin-bottom:24px}
.settings-section-title{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;
  color:var(--text3);margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.theme-toggle-row{display:flex;gap:8px;margin-top:2px}
.theme-btn{
  flex:1;padding:10px 0;border-radius:12px;border:1px solid var(--border2);
  background:var(--surface);color:var(--text2);font-family:var(--font);
  font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.theme-btn:hover{background:var(--surface2)}
.theme-btn.active{background:var(--surface2);border-color:var(--gold);color:var(--gold)}
.color-swatches{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.color-swatch{
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .15s;flex-shrink:0;
}
.color-swatch:hover{transform:scale(1.18)}
.color-swatch.active{border-color:var(--text);box-shadow:0 0 0 3px rgba(255,255,255,0.18)}
html[data-theme="light"] .color-swatch.active{box-shadow:0 0 0 3px rgba(0,0,0,0.14)}
.color-swatch-custom{
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  background:conic-gradient(
    hsl(0,100%,55%),hsl(40,100%,55%),hsl(80,100%,45%),
    hsl(140,100%,40%),hsl(180,100%,45%),hsl(220,100%,55%),
    hsl(260,100%,55%),hsl(300,100%,55%),hsl(340,100%,55%),hsl(360,100%,55%)
  );
  box-shadow:inset 0 0 0 7px var(--modal-bg);
  position:relative;flex-shrink:0;transition:all .15s;
}
.color-swatch-custom:hover{transform:scale(1.18);box-shadow:inset 0 0 0 5px var(--modal-bg)}
.color-swatch-custom input{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border-radius:50%;
}
.theme-nav-btn{
  width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);
  background:var(--surface);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:all .18s;
  flex-shrink:0;
}
.theme-nav-btn:hover{background:var(--surface2);transform:scale(1.1)}

/* ── Hamburger / mobile nav ─────────────────────────────────────── */
.hamburger-btn{
  display:none;width:36px;height:36px;border-radius:10px;
  border:1px solid var(--border2);background:var(--surface);
  cursor:pointer;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;flex-shrink:0;transition:background .18s;padding:0;
}
.hamburger-btn:hover{background:var(--surface2)}
.hamburger-btn span{
  display:block;width:16px;height:2px;background:var(--text);
  border-radius:2px;transition:all .2s;
}
.hamburger-btn.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hamburger-btn.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger-btn.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
.mobile-menu{
  position:fixed;top:calc(52px + env(safe-area-inset-top));
  left:0;right:0;z-index:98;
  background:var(--modal-bg);border-bottom:1px solid var(--border);
  box-shadow:0 12px 40px rgba(0,0,0,0.18);
  animation:slideInCard .2s ease both;
  overflow-y:auto;
  max-height:calc(100dvh - 52px - env(safe-area-inset-top));
}
.mobile-menu-inner{
  padding:12px 16px calc(16px + env(safe-area-inset-bottom));
}
.mobile-menu-tabs{display:flex;flex-direction:column;gap:2px;margin-bottom:12px}
.mobile-menu-tab{
  padding:13px 16px;border-radius:12px;border:none;
  background:transparent;color:var(--text2);font-family:var(--font);
  font-size:15px;font-weight:500;cursor:pointer;transition:all .18s;
  text-align:left;display:flex;align-items:center;gap:10px;
}
.mobile-menu-tab:hover{background:var(--surface);color:var(--text)}
.mobile-menu-tab.active{background:var(--surface2);color:var(--text);font-weight:600}
.mobile-menu-divider{height:1px;background:var(--border);margin:8px 0}
.mobile-menu-actions{display:flex;flex-direction:column;gap:2px}
.mobile-menu-action{
  padding:13px 16px;border-radius:12px;border:none;
  background:transparent;color:var(--text2);font-family:var(--font);
  font-size:15px;font-weight:500;cursor:pointer;transition:all .18s;
  text-align:left;display:flex;align-items:center;gap:10px;width:100%;
}
.mobile-menu-action:hover{background:var(--surface);color:var(--text)}
.mobile-menu-action.danger{color:var(--red)}
.mobile-menu-action.danger:hover{background:rgba(255,69,58,0.08)}
@media(max-width:960px){
  .hamburger-btn{display:flex}
  .nav-tabs{display:none}
  .nav-desktop-only{display:none !important}
  .nav-logo{font-size:17px}
}
@media(max-width:680px){
  /* Page */
  .page{padding-left:16px;padding-right:16px}
  .section-title{font-size:22px;letter-spacing:-0.4px;margin-bottom:4px}
  .section-sub{font-size:12px;margin-bottom:20px}
  .page-header{margin-bottom:20px;gap:8px}
  /* Stat grid → 2×2 */
  .stat-grid{grid-template-columns:1fr 1fr !important}
  .stat-card{padding:14px 16px 12px}
  .stat-value{font-size:20px !important;letter-spacing:-0.5px}
  .stat-sub{font-size:11px;margin-top:4px}
  .stat-badge{font-size:10px;padding:2px 7px;margin-top:4px}
  /* Cards */
  .card{padding:16px}
  .card-title{font-size:15px;margin-bottom:12px}
  /* Grids → single col */
  .two-col-grid{grid-template-columns:1fr}
  .stats-top-grid{grid-template-columns:1fr}
  .q-grid{grid-template-columns:1fr 1fr}
  /* Money bag: stack SVG over mini 2×2 stats */
  .bag-container{flex-direction:column;align-items:center;gap:12px}
  .bag-svg-wrap{animation:none}
  .bag-svg-wrap svg{width:100px !important;height:114px !important}
  .bag-ring-stats{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .ring-stat{margin-bottom:0}
  .ring-stat-value{font-size:17px;letter-spacing:-0.3px}
  .ring-stat-label{font-size:10px}
  /* Fun badges */
  .fun-badge{font-size:12px;padding:7px 12px;gap:5px}
  /* Week view */
  .week-day-grid{grid-template-columns:repeat(4,1fr) !important}
  .week-day{padding:10px 6px;min-height:68px}
  .week-day-name{font-size:9px}
  .week-day-date{font-size:12px}
  /* Table scroll */
  .entry-table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px}
  .weekly-stat-grid{grid-template-columns:1fr 1fr !important}
  /* Filters */
  .filter-row{gap:8px}
  .search-input{min-width:0;flex:0 0 100%}
  /* Recent entries */
  .recent-comment{font-size:12px}
  .recent-meta{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .recent-amount{font-size:13px}
  .recent-dot{width:28px;height:28px;font-size:12px}
  /* Modal + settings */
  .modal{padding:20px 16px;border-radius:20px;max-height:85dvh}
  .modal-overlay{align-items:flex-start;padding-top:calc(env(safe-area-inset-top) + 68px);padding-left:12px;padding-right:12px;padding-bottom:calc(env(safe-area-inset-bottom) + 12px)}
  .modal-title{font-size:19px}
  .modal-actions{flex-wrap:wrap;gap:8px}
  .modal-actions .btn{flex:1;min-width:100px;text-align:center;justify-content:center}
  .form-grid{grid-template-columns:1fr}
  .settings-grid{grid-template-columns:1fr}
  /* Touch targets */
  .btn{min-height:44px;display:inline-flex;align-items:center;justify-content:center}
  .btn-sm{min-height:36px}
  .week-nav-btn{width:44px;height:44px;font-size:18px}
  .filter-select{min-height:40px}
  /* Chart */
  .chart-month-label{font-size:8px}
  .chart-legend{gap:10px}
  .legend-item{font-size:11px}
  /* Drafts */
  .draft-card-actions{gap:6px}
  .draft-card-actions .btn{flex:1;min-width:0;text-align:center}
  /* Page bottom breathing room for fixed elements */
  .page{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
}
@media(max-width:480px){
  .week-day-grid{grid-template-columns:repeat(2,1fr) !important}
  .week-day{padding:8px 8px;min-height:60px}
  .week-nav-row{flex-wrap:wrap;justify-content:center;gap:8px}
  .stat-value{font-size:18px !important}
}
/* ── Active timer chip ──────────────────────────────────────────── */
.active-timer-chip{
  position:fixed;top:calc(52px + env(safe-area-inset-top) + 10px);
  left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.88);border:1px solid rgba(255,69,58,0.5);
  border-radius:24px;padding:10px 16px;z-index:199;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 24px rgba(255,69,58,0.2);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  animation:slideInCard .3s ease;
  max-width:calc(100vw - 32px);
}
html[data-theme="light"] .active-timer-chip{background:rgba(255,255,255,0.94);border-color:rgba(255,69,58,0.4)}
.timer-chip-dot{
  width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;
  animation:timer-pulse 1.2s ease-in-out infinite;
}
@keyframes timer-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.45;transform:scale(0.72)}}
.timer-chip-info{flex:1;min-width:0}
.timer-chip-label{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:0.4px}
.timer-chip-detail{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.timer-chip-elapsed{font-size:15px;font-weight:700;letter-spacing:-0.4px;color:var(--text);font-variant-numeric:tabular-nums;flex-shrink:0}
.timer-stop-btn{
  background:var(--red);color:#fff;border:none;border-radius:12px;
  padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);flex-shrink:0;transition:opacity .15s;
}
.timer-stop-btn:hover{opacity:.85}
.timer-confirm-row{display:flex;align-items:center;gap:8px}
.timer-confirm-time{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap}
.timer-confirm-yes{background:var(--red);color:#fff;border:none;border-radius:10px;padding:6px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
.timer-confirm-no{background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:10px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
/* ── Drafts ─────────────────────────────────────────────────────── */
.draft-list{display:flex;flex-direction:column;gap:12px}
.draft-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;transition:border-color .2s}
.draft-card.active{border-color:rgba(255,69,58,0.35);background:rgba(255,69,58,0.04)}
.draft-card.ready{border-color:rgba(48,209,88,0.3);background:rgba(48,209,88,0.04)}
.draft-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.draft-card-info{flex:1;min-width:0}
.draft-card-title{font-size:15px;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.draft-card-meta{font-size:12px;color:var(--text2);line-height:1.55}
.draft-card-status{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;padding:3px 9px;border-radius:8px;flex-shrink:0;align-self:flex-start;white-space:nowrap}
.draft-status-active{background:rgba(255,69,58,0.12);color:var(--red)}
.draft-status-ready{background:rgba(48,209,88,0.1);color:var(--green)}
.draft-status-incomplete{background:rgba(240,165,0,0.1);color:var(--gold)}

// ── Utils ────────────────────────────────────────────────────────────
const fmt = (n) => new Intl.NumberFormat('nl-BE',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
const fmtDec = (n) => new Intl.NumberFormat('nl-BE',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const fmtNum = (n,dec=1) => n.toFixed(dec);

function getDayOfWeek(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.getDay(); // 0=Sun,1=Mon,...,6=Sat
}

function calcHours(start, end, extraDays = 0) {
  if (!start || !end) return 0;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm) + extraDays * 24 * 60;
  if (extraDays === 0 && mins < 0) mins += 24 * 60; // overnight same-entry
  if (mins <= 0) return 0;
  return Math.round(mins / 30) * 0.5;
}

function calcEarnings(hours, dateStr, settings) {
  const day = getDayOfWeek(dateStr);
  const isSat = day === 6;
  const isSun = day === 0;
  const rate = isSun ? settings.sundayRate : isSat ? settings.saturdayRate : settings.weekdayRate;
  const inclVAT = hours * rate;
  const exclVAT = inclVAT / (1 + settings.vatRate);
  return { inclVAT, exclVAT, isSat, isSun, rate };
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

function getDayLabel(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
}

// ── Theme / Accent color ─────────────────────────────────────────────
const COLOR_PRESETS = [
  { name:'Goud',   hex:'#f0a500' },
  { name:'Blauw',  hex:'#0a84ff' },

  { name:'Rood',   hex:'#ff375f' },
  { name:'Paars',  hex:'#bf5af2' },
  { name:'Oranje', hex:'#ff6b35' },
  { name:'Cyaan',  hex:'#5ac8fa' },

];

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

function lightenHex(hex, factor = 0.38) {
  const { r, g, b } = hexToRgb(hex);
  const lr = Math.min(255, Math.round(r + (255 - r) * factor));
  const lg = Math.min(255, Math.round(g + (255 - g) * factor));
  const lb = Math.min(255, Math.round(b + (255 - b) * factor));
  return '#' + [lr,lg,lb].map(x => x.toString(16).padStart(2,'0')).join('');
}

function applyTheme(theme, accentHex) {
  const html = document.documentElement;
  html.setAttribute('data-theme', theme || 'dark');
  if (accentHex) {
    html.style.setProperty('--gold',  accentHex);
    html.style.setProperty('--gold2', lightenHex(accentHex, 0.38));
    const { r, g, b } = hexToRgb(accentHex);
    html.style.setProperty('--gold-rgb', `${r},${g},${b}`);
  }
}

// Apply defaults immediately so the UI is already themed on first paint
applyTheme('dark', '#f0a500');

// ── LocalStorage hook ────────────────────────────────────────────────
function useLS(key, initial) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  const set = useCallback((v) => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      localStorage.setItem(key, JSON.stringify(next));
      return next;
    });
  }, [key]);
  return [val, set];
}

// ── Donut Chart (Weekday vs Weekend) ────────────────────────────────
function DonutChart({ weekday, weekend }) {
  const total = weekday + weekend;
  if (total === 0) {
    return (
      <div className="card" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%'}}>
        <div className="card-title">Weekday vs Weekend</div>
        <div style={{color:'var(--text3)',fontSize:'13px',padding:'20px 0'}}>No data yet</div>
      </div>
    );
  }
  const wdPct = weekday / total;
  const wePct = weekend / total;
  const r = 52, cx = 70, cy = 70, circ = 2 * Math.PI * r;
  const wdDash = wdPct * circ;
  const weDash = wePct * circ;
  return (
    <div className="card" style={{height:'100%'}}>
      <div className="card-title">Weekday vs Weekend</div>
      <div style={{display:'flex',alignItems:'center',gap:'20px'}}>
        <svg width="140" height="140" style={{flexShrink:0}}>
          <circle cx={cx} cy={cy} r={r} fill="none" style={{stroke:'var(--border2)'}} strokeWidth="16"/>
          <circle cx={cx} cy={cy} r={r} fill="none" style={{stroke:'var(--gold)'}} strokeWidth="16"
            strokeLinecap="butt"
            strokeDasharray={`${wdDash} ${circ - wdDash}`}
            strokeDashoffset={circ * 0.25}/>
          <circle cx={cx} cy={cy} r={r} fill="none" style={{stroke:'var(--blue)'}} strokeWidth="16"
            strokeLinecap="butt"
            strokeDasharray={`${weDash} ${circ - weDash}`}
            strokeDashoffset={circ * 0.25 - wdDash}/>
          <text x={cx} y={cy - 6} textAnchor="middle" style={{fill:'var(--text)'}} fontSize="17" fontWeight="700" fontFamily="-apple-system,sans-serif">
            {(wdPct*100).toFixed(0)}%
          </text>
          <text x={cx} y={cy + 10} textAnchor="middle" style={{fill:'var(--text3)'}} fontSize="9" fontFamily="-apple-system,sans-serif">
            weekday
          </text>
        </svg>
        <div style={{flex:1}}>
          <div style={{marginBottom:'14px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
              <div style={{width:'10px',height:'10px',borderRadius:'3px',background:'var(--gold)',flexShrink:0}}/>
              <span style={{fontSize:'12px',color:'var(--text2)'}}>Weekday</span>
            </div>
            <div style={{fontSize:'20px',fontWeight:'700',letterSpacing:'-0.5px',color:'var(--gold)'}}>€{weekday.toFixed(2)}</div>
            <div style={{fontSize:'11px',color:'var(--text3)'}}>{(wdPct*100).toFixed(1)}% of total</div>
          </div>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
              <div style={{width:'10px',height:'10px',borderRadius:'3px',background:'var(--blue)',flexShrink:0}}/>
              <span style={{fontSize:'12px',color:'var(--text2)'}}>Weekend</span>
            </div>
            <div style={{fontSize:'20px',fontWeight:'700',letterSpacing:'-0.5px',color:'var(--blue)'}}>€{weekend.toFixed(2)}</div>
            <div style={{fontSize:'11px',color:'var(--text3)'}}>{(wePct*100).toFixed(1)}% of total</div>
          </div>

}

// ── Confetti ─────────────────────────────────────────────────────────
function Confetti({ active }) {
  const cvRef = useRef(null);
  const rafRef = useRef(null);
  useEffect(() => {
    if (!active) return;
    const cv = cvRef.current;
    if (!cv) return;
    const ctx = cv.getContext('2d');
    cv.width = window.innerWidth;
    cv.height = window.innerHeight;
    const COLORS = ['#f0a500','#ffd060','#30d158','#0a84ff','#bf5af2','#ff453a','#ff9f0a','#ffffff','#ff375f','#5ac8fa'];
    const pts = Array.from({length: 220}, (_, i) => ({
      x: Math.random() * cv.width,
      y: -20 - Math.random() * 180,
      w: 5 + Math.random() * 9,
      h: 3 + Math.random() * 5,
      c: COLORS[i % COLORS.length],
      vx: (Math.random() - 0.5) * 6,
      vy: 1.5 + Math.random() * 3.5,
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 9,
      g: 0.05 + Math.random() * 0.07,
      a: 1,
    }));
    const tick = () => {
      ctx.clearRect(0, 0, cv.width, cv.height);
      let alive = false;
      pts.forEach(p => {
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.a -= 0.0045;
        if (p.a > 0 && p.y < cv.height + 10) alive = true;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.a);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.c;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
      if (alive) rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [active]);
  if (!active) return null;
  return <canvas ref={cvRef} style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999}}/>;
}

// ── Monthly Chart ────────────────────────────────────────────────────
function MonthlyChart({ entries }) {
  const monthly = useMemo(() => {
    return MONTHS_SHORT.map((m, mi) => {
      const monthEntries = entries.filter(e => new Date(e.date + 'T12:00:00').getMonth() === mi);
      const weekday = monthEntries.filter(e => !e.isSat && !e.isSun).reduce((s,e) => s + e.earningsInclVAT, 0);
      const weekend = monthEntries.filter(e => e.isSat || e.isSun).reduce((s,e) => s + e.earningsInclVAT, 0);
      const total = weekday + weekend;
      const hours = monthEntries.reduce((s,e) => s + e.totalHours, 0);
      return { m, weekday, weekend, total, hours };
    });
  }, [entries]);

  const maxVal = Math.max(...monthly.map(m => m.total), 1);

  return (
    <div className="card">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
        <div className="card-title" style={{marginBottom:0}}>Monthly Earnings <span>2026</span></div>
        <div className="chart-legend">
          <div className="legend-item"><div className="legend-dot" style={{background:'var(--gold)'}}/> Weekday</div>
          <div className="legend-item"><div className="legend-dot" style={{background:'var(--blue)'}}/> Weekend</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'flex-end',gap:'4px',height:'140px',paddingBottom:'28px',position:'relative'}}>
        {monthly.map((m, i) => {
          const wdH = m.total > 0 ? (m.weekday / maxVal) * 112 : 0;
          const weH = m.total > 0 ? (m.weekend / maxVal) * 112 : 0;
          return (
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',height:'100%',position:'relative'}}>
              <div style={{display:'flex',gap:'2px',alignItems:'flex-end',width:'100%',height:'calc(100% - 20px)'}}>
                <div
                  className="chart-bar weekday"
                  data-tip={`Weekday: ${fmt(m.weekday)}`}
                  style={{flex:1,height:`${Math.max(wdH,m.weekday>0?3:0)}px`,borderRadius:'4px 4px 0 0',minHeight:m.weekday>0?3:0,transition:'height .5s ease',cursor:'default',position:'relative'}}
                />
                <div
                  className="chart-bar weekend"
                  data-tip={`Weekend: ${fmt(m.weekend)}`}
                  style={{flex:1,height:`${Math.max(weH,m.weekend>0?3:0)}px`,borderRadius:'4px 4px 0 0',minHeight:m.weekend>0?3:0,transition:'height .5s ease',cursor:'default',position:'relative'}}
                />
              </div>
              <div style={{position:'absolute',bottom:0,fontSize:'9px',color:m.total>0?'var(--text2)':'var(--text3)',letterSpacing:'0.2px',textAlign:'center',width:'100%'}}>
                {m.m}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Add Entry Modal ──────────────────────────────────────────────────
function AddEntryModal({ onClose, onSave, onSaveDraft, settings, editEntry }) {
  const today = (() => { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; })();
  const isDraftEdit = editEntry && editEntry._isDraftEdit;
  const [form, setForm] = useState(editEntry ? {
    date: editEntry.date,
    jobType: editEntry.jobType,
    vessel: editEntry.vessel || '',
    location: editEntry.location || editEntry.comment || '',
    startTime: editEntry.startTime,
    endTime: editEntry.endTime || '',
    extraDays: editEntry.extraDays || 0,
    km: editEntry.kmDistance ? String(editEntry.kmDistance) : '',
  } : { date: today, jobType: 'Lossen', vessel: '', location: '', startTime: '', endTime: '', extraDays: 0, km: '' });
  const [kmCopied, setKmCopied] = useState(false);

  const calc = useMemo(() => {
    if (!form.date || !form.startTime || !form.endTime) return null;
    const hours = calcHours(form.startTime, form.endTime, Number(form.extraDays));
    if (hours <= 0) return null;
    return { hours, ...calcEarnings(hours, form.date, settings) };
  }, [form, settings]);

  function upd(k, v) { setForm(f => ({...f, [k]: v})); }

  // compute end date label for multi-day shifts
  const endDateLabel = useMemo(() => {
    if (!form.date || Number(form.extraDays) === 0) return null;
    const d = new Date(form.date + 'T12:00:00');
    d.setDate(d.getDate() + Number(form.extraDays));
    return d.toLocaleDateString('en-GB', {weekday:'short', day:'2-digit', month:'short'});
  }, [form.date, form.extraDays]);

  function save() {
    if (!form.date || !form.startTime || !form.endTime || !form.vessel || !form.location) return;
    if (!calc) return;
    const entry = {
      id: (editEntry && !isDraftEdit) ? editEntry.id : uid(),
      date: form.date,
      jobType: form.jobType,
      vessel: form.vessel.trim(),
      location: form.location.trim(),
      comment: `${form.vessel.trim()} ${form.location.trim()}`,
      startTime: form.startTime,
      endTime: form.endTime,
      extraDays: Number(form.extraDays),
      totalHours: calc.hours,
      earningsInclVAT: calc.inclVAT,
      earningsExclVAT: calc.exclVAT,
      isSat: calc.isSat,
      isSun: calc.isSun,
      kmDistance: Number(form.km) || 0,
      kmEarnings: Number(form.km) ? Number(form.km) * 2 * 0.25 : 0,
    };
    onSave(entry);
  }

  function saveDraft(isActive = false) {
    if (!form.date || !form.startTime || !form.vessel.trim()) return;
    onSaveDraft({
      id: isDraftEdit ? editEntry.id : 'draft_' + uid(),
      date: form.date,
      jobType: form.jobType,
      vessel: form.vessel.trim(),
      location: form.location.trim(),
      startTime: form.startTime,
      endTime: form.endTime || '',
      extraDays: Number(form.extraDays),
      isActive,
    });
  }

  const rateName = calc ? (calc.isSun ? 'Sunday rate' : calc.isSat ? 'Saturday rate' : 'Weekday rate') : '';
  const canSave = calc && form.vessel.trim().length > 0 && form.location.trim().length > 0;

          <div className="field">
            <label>Start Date</label>
            <input type="date" className="input" value={form.date} onChange={e => upd('date', e.target.value)}/>
          </div>
          <div className="field">
            <label>Job Type</label>
            <select className="input" value={form.jobType} onChange={e => upd('jobType', e.target.value)}>
              <option value="Lossen">Lossen (Unloading)</option>
              <option value="Laden">Laden (Loading)</option>
              <option value="Robot">Robot hogedrukreiniging</option>
            </select>
          </div>
          <div className="field">
            <label>Start Time <span style={{color:'var(--text3)',fontWeight:400,textTransform:'none',fontSize:'11px'}}>HH:MM</span></label>
            <input
              type="text" className="input" placeholder="06:00"
              value={form.startTime}
              onChange={e => upd('startTime', e.target.value)}
              maxLength={5}
            />
          </div>
          <div className="field">
            <label>End Time <span style={{color:'var(--text3)',fontWeight:400,textTransform:'none',fontSize:'11px'}}>HH:MM</span></label>
            <input
              type="text" className="input" placeholder="13:00"

              onClick={() => saveDraft(false)}
              disabled={!form.date || !form.startTime || !form.vessel.trim()}
              style={{opacity:(form.date && form.startTime && form.vessel.trim()) ? 1 : 0.4}}
            >
              📝 Concept
            </button>
          )}
          {onSaveDraft && isDraftEdit && (
            <button
              className="btn btn-ghost"
              onClick={() => saveDraft(false)}
              disabled={!form.date || !form.startTime || !form.vessel.trim()}
              style={{opacity:(form.date && form.startTime && form.vessel.trim()) ? 1 : 0.4}}
            >
              💾 Concept opslaan
            </button>
          )}
          {onSaveDraft && !editEntry && form.date && form.startTime && form.vessel.trim() && !form.endTime && (
            <button
              className="btn"
              onClick={() => saveDraft(true)}
              style={{background:'var(--red)',color:'#fff'}}
            >
              ▶ Start Timer
            </button>
          )}
          <button
            className="btn btn-primary"
            onClick={save}
            disabled={!canSave}
            style={{opacity: canSave ? 1 : 0.4, cursor: canSave ? 'pointer' : 'not-allowed'}}
          >
            {isDraftEdit ? 'Opslaan als shift' : editEntry ? 'Opslaan' : 'Log Shift'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Fun Badges ───────────────────────────────────────────────────────
function FunBadges({ entries }) {
  const { activeDays, level, levelName, bestDay, totalHours } = useMemo(() => {
    const totalHours = entries.reduce((s, e) => s + e.totalHours, 0);

    // Active days this month
    const now = new Date();
    const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const activeDays = new Set(entries.filter(e => e.date.startsWith(thisMonth)).map(e => e.date)).size;

    // Level from total hours
    let level = 1, levelName = 'Matrozenjongen';
    if (totalHours >= 500) { level = 5; levelName = 'Kapitein'; }
    else if (totalHours >= 300) { level = 4; levelName = 'Eerste Stuurman'; }
    else if (totalHours >= 150) { level = 3; levelName = 'Bootsman'; }
    else if (totalHours >= 50)  { level = 2; levelName = 'Matroos'; }

    // Best single day
    const dayMap = {};
    entries.forEach(e => { dayMap[e.date] = (dayMap[e.date] || 0) + e.earningsInclVAT; });
    const bestDay = Math.max(0, ...Object.values(dayMap));

    return { activeDays, level, levelName, bestDay, totalHours };
  }, [entries]);

  return (
    <div className="fun-badges-row">
      {activeDays > 0 && (
        <div className="fun-badge badge-fire" style={{animationDelay:'.05s'}}>
          🔥 {activeDays} dag{activeDays > 1 ? 'en' : ''} actief deze maand
        </div>
      )}
      <div className="fun-badge badge-level" style={{animationDelay:'.12s'}}>
        ⚓ Level {level} — {levelName}
      </div>
      {bestDay > 0 && (
        <div className="fun-badge badge-record" style={{animationDelay:'.19s'}}>
          🏆 Beste dag: {fmtDec(bestDay)}
        </div>
      )}
      <div className="fun-badge badge-ship" style={{animationDelay:'.26s'}}>
        ⏱ {totalHours.toFixed(1)} uur gevaren
      </div>
    </div>
  );
}

// ── Stats View ───────────────────────────────────────────────────────
function KwartaalStats({ entries, settings }) {
  const curYear = new Date().getFullYear();
  const [year, setYear] = useState(curYear);

  const years = useMemo(() => {
    const ys = new Set(entries.map(e => e.date.slice(0,4)));
    ys.add(String(curYear));
    return [...ys].sort().reverse();
  }, [entries]);

  const calcBlock = (subset) => {
    const inclVAT = subset.reduce((s,e) => s + e.earningsInclVAT, 0);
    const exclVAT = inclVAT / (1 + settings.vatRate);
    const btw     = inclVAT - exclVAT;
    const tax     = exclVAT * settings.taxRate;
    const netto   = exclVAT - tax;
    return { inclVAT, exclVAT, btw, tax, netto, count: subset.length, hours: subset.reduce((s,e) => s+e.totalHours,0) };
  };

  const yearEntries = useMemo(() => entries.filter(e => e.date.startsWith(String(year))), [entries, year]);

  const quarters = useMemo(() => [
    { label:'Q1', sub:'Jan – Mrt', months:[1,2,3] },
    { label:'Q2', sub:'Apr – Jun', months:[4,5,6] },
    { label:'Q3', sub:'Jul – Sep', months:[7,8,9] },
    { label:'Q4', sub:'Okt – Dec', months:[10,11,12] },
  ].map(q => ({
    ...q,
    ...calcBlock(yearEntries.filter(e => q.months.includes(parseInt(e.date.slice(5,7))))),
  })), [yearEntries, settings]);

  const months = useMemo(() => Array.from({length:12}, (_,i) => {
    const m = i + 1;
    const mStr = String(m).padStart(2,'0');
    return {
      name: new Date(year, i, 1).toLocaleDateString('nl-BE',{month:'long'}),
      ...calcBlock(yearEntries.filter(e => e.date.startsWith(`${year}-${mStr}`))),
    };
  }), [yearEntries, settings, year]);

  const yearTotal = useMemo(() => calcBlock(yearEntries), [yearEntries, settings]);

  const qColors = ['var(--gold)','var(--blue)','var(--green)','var(--purple)'];
  const Row = ({label, value, color, bold}) => (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid var(--border)'}}>
      <span style={{fontSize:'12px',color:'var(--text2)'}}>{label}</span>
      <span style={{fontSize:'13px',fontWeight:bold?700:500,color:color||'var(--text)'}}>{value}</span>
    </div>
  );

  return (
    <div className="card" style={{marginBottom:'20px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px',flexWrap:'wrap',gap:'8px'}}>
        <div className="card-title" style={{marginBottom:0}}>Kwartaal & Maand overzicht</div>
        <div style={{display:'flex',gap:'6px'}}>
          {years.map(y => (
            <button key={y} onClick={() => setYear(Number(y))}
              style={{padding:'5px 12px',borderRadius:'8px',border:'1px solid',cursor:'pointer',fontSize:'12px',fontFamily:'var(--font)',fontWeight:600,
                background:year===Number(y)?'var(--gold)':'var(--surface2)',
                color:year===Number(y)?'#000':'var(--text2)',
                borderColor:year===Number(y)?'var(--gold)':'var(--border2)'}}>
              {y}
            </button>
          ))}
        </div>
      </div>

      {/* Quarter cards */}
      <div className="q-grid" style={{marginBottom:'20px'}}>
        {quarters.map((q,i) => (
          <div key={q.label} style={{background:'var(--surface)',borderRadius:'12px',padding:'14px 12px',border:'1px solid var(--border2)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'10px'}}>
              <span style={{fontSize:'16px',fontWeight:700,color:qColors[i]}}>{q.label}</span>
              <span style={{fontSize:'11px',color:'var(--text3)'}}>{q.sub}</span>
            </div>
            {q.count === 0
              ? <div style={{fontSize:'12px',color:'var(--text3)',textAlign:'center',padding:'12px 0'}}>Geen shifts</div>
              : <>
                  <div style={{fontSize:'11px',color:'var(--text3)',marginBottom:'8px'}}>{q.count} shift{q.count>1?'s':''} · {q.hours.toFixed(1)}h</div>
                  <Row label="Bruto" value={fmtDec(q.inclVAT)}/>
                  <Row label="BTW 21%" value={`-${fmtDec(q.btw)}`} color="var(--red)"/>
                  <Row label="Excl. BTW" value={fmtDec(q.exclVAT)}/>
                  <Row label={`Tax ${(settings.taxRate*100).toFixed(0)}%`} value={`-${fmtDec(q.tax)}`} color="var(--red)"/>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'8px',padding:'8px 10px',background:`rgba(${i===0?'255,214,10':i===1?'10,132,255':i===2?'48,209,88':'191,90,242'},0.1)`,borderRadius:'8px'}}>
                    <span style={{fontSize:'12px',fontWeight:600,color:qColors[i]}}>Netto</span>
                    <span style={{fontSize:'14px',fontWeight:700,color:qColors[i]}}>{fmtDec(q.netto)}</span>
                  </div>
                </>
            }
          </div>
        ))}
      </div>

      {/* Monthly table */}
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
          <thead>
            <tr style={{borderBottom:'2px solid var(--border)'}}>
              {['Maand','Shifts','Bruto','BTW 21%','Excl. BTW',`Tax ${(settings.taxRate*100).toFixed(0)}%`,'Netto'].map(h => (
                <th key={h} style={{padding:'7px 10px',textAlign:h==='Maand'||h==='Shifts'?'left':'right',fontSize:'11px',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.3px',fontWeight:600,whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {months.map((m,i) => (
              <tr key={i} style={{borderBottom:'1px solid var(--border)',opacity:m.count===0?0.35:1}}>
                <td style={{padding:'8px 10px',fontWeight:500,textTransform:'capitalize'}}>{m.name}</td>
                <td style={{padding:'8px 10px',color:'var(--text3)'}}>{m.count}</td>
                <td style={{padding:'8px 10px',textAlign:'right',fontWeight:500}}>{m.count>0?fmtDec(m.inclVAT):'–'}</td>
                <td style={{padding:'8px 10px',textAlign:'right',color:'var(--red)'}}>{m.count>0?`-${fmtDec(m.btw)}`:'–'}</td>
                <td style={{padding:'8px 10px',textAlign:'right'}}>{m.count>0?fmtDec(m.exclVAT):'–'}</td>
                <td style={{padding:'8px 10px',textAlign:'right',color:'var(--red)'}}>{m.count>0?`-${fmtDec(m.tax)}`:'–'}</td>
                <td style={{padding:'8px 10px',textAlign:'right',fontWeight:700,color:'var(--green)'}}>{m.count>0?fmtDec(m.netto):'–'}</td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr style={{borderTop:'2px solid var(--border)',background:'var(--surface)'}}>
              <td style={{padding:'9px 10px',fontWeight:700}}>Totaal {year}</td>
              <td style={{padding:'9px 10px',color:'var(--text2)',fontWeight:600}}>{yearTotal.count}</td>
              <td style={{padding:'9px 10px',textAlign:'right',fontWeight:700}}>{fmtDec(yearTotal.inclVAT)}</td>
              <td style={{padding:'9px 10px',textAlign:'right',color:'var(--red)',fontWeight:700}}>-{fmtDec(yearTotal.btw)}</td>
              <td style={{padding:'9px 10px',textAlign:'right',fontWeight:700}}>{fmtDec(yearTotal.exclVAT)}</td>
              <td style={{padding:'9px 10px',textAlign:'right',color:'var(--red)',fontWeight:700}}>-{fmtDec(yearTotal.tax)}</td>
              <td style={{padding:'9px 10px',textAlign:'right',fontWeight:700,color:'var(--green)'}}>{fmtDec(yearTotal.netto)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

function StatsView({ entries, settings }) {
  const stats = useMemo(() => {
    const weekdayE = entries.filter(e => !e.isSat && !e.isSun).reduce((s,e) => s + e.earningsInclVAT, 0);
    const satE     = entries.filter(e => e.isSat).reduce((s,e) => s + e.earningsInclVAT, 0);
    const sunE     = entries.filter(e => e.isSun).reduce((s,e) => s + e.earningsInclVAT, 0);
    const weekendE = satE + sunE;

    const vesselMap = {}, locMap = {}, dayMap = {};
    entries.forEach(e => {
      const v = e.vessel || 'Onbekend';
      if (!vesselMap[v]) vesselMap[v] = { earnings:0, hours:0, count:0 };
      vesselMap[v].earnings += e.earningsInclVAT;
      vesselMap[v].hours    += e.totalHours;
      vesselMap[v].count++;

      const l = e.location || 'Onbekend';
      if (!locMap[l]) locMap[l] = { earnings:0, hours:0, count:0 };
      locMap[l].earnings += e.earningsInclVAT;
      locMap[l].hours    += e.totalHours;
      locMap[l].count++;

      dayMap[e.date] = (dayMap[e.date] || 0) + e.earningsInclVAT;
    });

    const topVessels   = Object.entries(vesselMap).sort((a,b) => b[1].earnings - a[1].earnings).slice(0,6);
    const topLocations = Object.entries(locMap).sort((a,b) => b[1].earnings - a[1].earnings).slice(0,6);
    const sortedDays   = Object.entries(dayMap).sort((a,b) => b[1] - a[1]);
    const bestDay      = sortedDays[0] || null;

    return { weekdayE, satE, sunE, weekendE, topVessels, topLocations, bestDay, sortedDays };
  }, [entries]);

  const total = stats.weekdayE + stats.weekendE;
  const barTypes = [
    { label:'Weekdagen (Ma–Vr)', amount:stats.weekdayE, color:'var(--gold)' },
    { label:'Zaterdag',          amount:stats.satE,     color:'var(--blue)' },
    { label:'Zondag',            amount:stats.sunE,     color:'var(--purple)' },
  ];

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="section-title">Statistics</div>
          <div className="section-sub">Weekdag vs weekend · top schepen · top locaties</div>
        </div>
      </div>

      <KwartaalStats entries={entries} settings={settings}/>

      <div className="stats-top-grid">
        <DonutChart weekday={stats.weekdayE} weekend={stats.weekendE}/>
        <div className="card">
          <div className="card-title">Verdeling per tarief</div>
          {barTypes.map(({label, amount, color}) => {
            const pct = total > 0 ? amount / total * 100 : 0;
            return (
              <div key={label} style={{marginBottom:'20px'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}>
                  <span style={{fontSize:'13px',color:'var(--text2)'}}>{label}</span>
                  <span style={{fontSize:'13px',fontWeight:'600',color}}>
                    {fmtDec(amount)} <span style={{color:'var(--text3)',fontWeight:'400'}}>({pct.toFixed(1)}%)</span>
                  </span>
                </div>
                <div className="progress-bar" style={{height:'7px',borderRadius:'4px'}}>
                  <div className="progress-fill" style={{width:`${pct}%`,background:color,borderRadius:'4px',transition:'width .8s ease'}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="two-col-grid" style={{marginBottom:'20px'}}>
        <div className="card">
          <div className="card-title">Top Schepen ⚓</div>
          {stats.topVessels.length === 0
            ? <div style={{color:'var(--text3)',fontSize:'13px'}}>Geen data</div>
            : stats.topVessels.map(([vessel, d], i) => (
              <div key={vessel} className="rank-row">
                <div className="rank-num" style={{background:'rgba(10,132,255,0.1)',color:'var(--blue)'}}>#{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'13px',fontWeight:'500',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{vessel}</div>
                  <div style={{fontSize:'11px',color:'var(--text3)'}}>{d.count} shift{d.count>1?'s':''} · {d.hours.toFixed(1)}h</div>
                </div>
                <div style={{fontSize:'13px',fontWeight:'700',color:'var(--gold)',flexShrink:0}}>{fmtDec(d.earnings)}</div>
              </div>
            ))}
        </div>
        <div className="card">
          <div className="card-title">Top Locaties 📍</div>
          {stats.topLocations.length === 0
            ? <div style={{color:'var(--text3)',fontSize:'13px'}}>Geen data</div>
            : stats.topLocations.map(([loc, d], i) => (
              <div key={loc} className="rank-row">
                <div className="rank-num" style={{background:'rgba(48,209,88,0.1)',color:'var(--green)'}}>#{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'13px',fontWeight:'500',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{loc}</div>
                  <div style={{fontSize:'11px',color:'var(--text3)'}}>{d.count} shift{d.count>1?'s':''} · {d.hours.toFixed(1)}h</div>
                </div>
                <div style={{fontSize:'13px',fontWeight:'700',color:'var(--green)',flexShrink:0}}>{fmtDec(d.earnings)}</div>
              </div>
            ))}
        </div>
      </div>

      {stats.bestDay && (
        <div className="card">
          <div className="card-title">Persoonlijke Records 🏆</div>
          <div style={{display:'flex',gap:'40px',flexWrap:'wrap'}}>
            <div>
              <div style={{fontSize:'11px',color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.3px',marginBottom:'6px'}}>Beste enkele dag</div>
              <div style={{fontSize:'28px',fontWeight:'700',color:'var(--gold)',letterSpacing:'-1px'}}>{fmtDec(stats.bestDay[1])}</div>

            <div>
              <div style={{fontSize:'11px',color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.3px',marginBottom:'6px'}}>Totaal shifts</div>
              <div style={{fontSize:'28px',fontWeight:'700',letterSpacing:'-1px'}}>{entries.length}</div>
              <div style={{fontSize:'12px',color:'var(--text3)',marginTop:'4px'}}>{entries.reduce((s,e) => s+e.totalHours,0).toFixed(1)} uur totaal</div>
            </div>
            <div>
              <div style={{fontSize:'11px',color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.3px',marginBottom:'6px'}}>Gem. per shift</div>

      )}
    </div>
  );
}

// ── Dashboard ────────────────────────────────────────────────────────
function Dashboard({ entries, settings, onAdd }) {
  const stats = useMemo(() => {
    const totalInclVAT = entries.reduce((s,e) => s + e.earningsInclVAT, 0);
    const totalExclVAT = totalInclVAT / (1 + settings.vatRate);
    const vatCollected = totalInclVAT - totalExclVAT;
    const taxEst = totalExclVAT * settings.taxRate;
    const netProfit = totalExclVAT - taxEst;
    const totalHours = entries.reduce((s,e) => s + e.totalHours, 0);
    const weekdayEarnings = entries.filter(e => !e.isSat && !e.isSun).reduce((s,e) => s + e.earningsInclVAT, 0);
    const weekendEarnings = entries.filter(e => e.isSat || e.isSun).reduce((s,e) => s + e.earningsInclVAT, 0);
    const progress = totalInclVAT / settings.yearlyGoal;
    return { totalInclVAT, totalExclVAT, vatCollected, taxEst, netProfit, totalHours, weekdayEarnings, weekendEarnings, progress };
  }, [entries, settings]);

  return (
    <div className="page">
      <div className="page-header">
