// ── History View ─────────────────────────────────────────────────────
function HistoryView({ entries, onAdd, onEdit, onDelete, onBulkDelete }) {
  const [search, setSearch] = useState('');
  const [filterMonth, setFilterMonth] = useState('all');
  const [filterType, setFilterType] = useState('all');
  const [filterWeekend, setFilterWeekend] = useState('all');
  const [selectMode, setSelectMode] = useState(false);
  const [selected, setSelected] = useState(new Set());
  const [confirmId, setConfirmId] = useState(null);
  const [confirmBulk, setConfirmBulk] = useState(false);

  const filtered = useMemo(() => {
    return [...entries]
      .filter(e => {
        if (filterMonth !== 'all' && new Date(e.date+'T12:00:00').getMonth() !== parseInt(filterMonth)) return false;
        if (filterType !== 'all' && e.jobType !== filterType) return false;
        if (filterWeekend === 'weekday' && (e.isSat || e.isSun)) return false;
        if (filterWeekend === 'weekend' && !e.isSat && !e.isSun) return false;
        if (search) {
          const q = search.trim().toLowerCase();
          const hay = [e.comment, e.vessel, e.location, e.date, e.jobType].filter(Boolean).join(' ').toLowerCase();
          let found = hay.includes(q);
          if (!found) {
            const abbrev = q.match(/^([a-z])\s*(\d+)$/i);
            if (abbrev) {
              const hayV = (e.vessel || e.comment || '').toLowerCase();
              found = hayV.startsWith(abbrev[1].toLowerCase()) && hayV.includes(abbrev[2]);
            }
          }
          if (!found) return false;
        }
        return true;
      })
      .sort((a,b) => b.date.localeCompare(a.date) || b.startTime.localeCompare(a.startTime));
  }, [entries, search, filterMonth, filterType, filterWeekend]);

  const totalFiltered = filtered.reduce((s,e) => s + e.earningsInclVAT, 0);
  const hoursFiltered = filtered.reduce((s,e) => s + e.totalHours, 0);

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="section-title">Work History</div>
          <div className="section-sub">{filtered.length} entries · {fmtNum(hoursFiltered,1)} hrs · {fmtDec(totalFiltered)}</div>
        </div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          <button
            className={`btn btn-sm${selectMode ? ' btn-danger' : ' btn-ghost'}`}
            onClick={() => { setSelectMode(s => !s); setSelected(new Set()); setConfirmId(null); setConfirmBulk(false); }}
          >
            {selectMode ? 'Annuleer' : 'Selecteer'}
          </button>
          <button className="btn btn-primary" onClick={onAdd}>+ Log Work</button>
        </div>
      </div>

      {selectMode && selected.size > 0 && (
        <div style={{
          background:'rgba(255,69,58,0.08)',border:'1px solid rgba(255,69,58,0.22)',
          borderRadius:'12px',padding:'10px 16px',marginBottom:'16px',
          display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px',flexWrap:'wrap',
        }}>
          <span style={{fontSize:'13px',fontWeight:'600',color:'var(--red)'}}>{selected.size} geselecteerd</span>
          {confirmBulk ? (
            <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
              <span style={{fontSize:'12px',fontWeight:600}}>Zeker verwijderen?</span>
              <button className="btn btn-danger btn-sm" onClick={() => { onBulkDelete([...selected]); setSelected(new Set()); setSelectMode(false); setConfirmBulk(false); }}>✓ Ja</button>
              <button className="btn btn-ghost btn-sm" onClick={() => setConfirmBulk(false)}>✗ Nee</button>
            </div>
          ) : (
            <button className="btn btn-danger btn-sm" onClick={() => setConfirmBulk(true)}>🗑 Verwijder {selected.size}</button>
          )}
        </div>
      )}

      <div className="filter-row">
        <input className="search-input" placeholder="Zoek locatie, schip (b.v. A107)..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="filter-select" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)}>
          <option value="all">All Months</option>
          {MONTHS_FULL.map((m,i) => <option key={i} value={i}>{m}</option>)}
        </select>
        <select className="filter-select" value={filterType} onChange={e=>setFilterType(e.target.value)}>
          <option value="all">All Types</option>
          <option value="Lossen">Lossen</option>
          <option value="Laden">Laden</option>
          <option value="Robot">Robot</option>
        </select>
        <select className="filter-select" value={filterWeekend} onChange={e=>setFilterWeekend(e.target.value)}>
          <option value="all">All Days</option>
          <option value="weekday">Weekdays</option>
          <option value="weekend">Weekends</option>
        </select>
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {filtered.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">⚓</div>
            <div className="empty-title">No entries found</div>
            <div className="empty-sub">Try adjusting your filters or log a new work session.</div>
          </div>
        ) : (
          <div className="entry-table-scroll">
          <table className="entry-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Location / Ship</th>
                <th>Time</th>
                <th>Hours</th>
                <th>Excl. VAT</th>
                <th>Incl. VAT</th>
                <th>Km</th>
                <th style={{textAlign:'center'}}>{selectMode ? (
                  <input type="checkbox"
                    checked={selected.size === filtered.length && filtered.length > 0}
                    onChange={ev => setSelected(ev.target.checked ? new Set(filtered.map(x=>x.id)) : new Set())}
                    style={{width:'14px',height:'14px',cursor:'pointer',accentColor:'var(--gold)'}}
                  />
                ) : ''}</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(e => {
                const exclVAT = e.earningsExclVAT || (e.earningsInclVAT / 1.21);
                return (
                  <tr key={e.id}>
                    <td>
                      <div style={{fontWeight:500}}>{formatDate(e.date)}</div>
                      <div className="day-tag">{getDayLabel(e.date)}</div>
                    </td>
                    <td>
                      <span className={`job-tag job-${e.jobType.toLowerCase()}`}>{e.jobType}</span>
                    </td>
                    <td style={{maxWidth:'220px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {e.vessel ? <><span style={{color:'var(--text)',fontWeight:500}}>{e.vessel}</span><span style={{color:'var(--text2)'}}> {e.location}</span></> : e.comment}
                    </td>
                    <td style={{color:'var(--text2)',fontSize:'12px',fontVariantNumeric:'tabular-nums'}}>
                      {e.startTime} – {e.endTime}
                    </td>
                    <td className="entry-hours">{fmtNum(e.totalHours,1)}h</td>
                    <td style={{color:'var(--text2)',fontVariantNumeric:'tabular-nums',fontSize:'13px'}}>{fmtDec(exclVAT)}</td>
                    <td className={`entry-earnings${(e.isSat||e.isSun)?' weekend':''}`} style={{fontVariantNumeric:'tabular-nums'}}>
                      {fmtDec(e.earningsInclVAT)}
                    </td>
                    <td style={{fontSize:'12px',whiteSpace:'nowrap'}}>
                      {Number(e.kmDistance) > 0
                        ? <><div style={{fontWeight:600,color:'var(--green)'}}>{e.kmDistance * 2} km</div><div style={{color:'var(--text3)'}}>{fmtDec(e.kmDistance * 2 * 0.25)}</div></>
                        : <span style={{color:'var(--text3)'}}>–</span>}
                    </td>
                    <td style={{textAlign:'center'}}>
                      {selectMode ? (
                        <input type="checkbox"
                          checked={selected.has(e.id)}
                          onChange={() => setSelected(s => { const n = new Set(s); n.has(e.id) ? n.delete(e.id) : n.add(e.id); return n; })}
                          style={{width:'16px',height:'16px',cursor:'pointer',accentColor:'var(--gold)'}}
                        />
                      ) : confirmId === e.id ? (
                        <div style={{display:'flex',gap:'5px',alignItems:'center',justifyContent:'center'}}>
                          <span style={{fontSize:'11px',fontWeight:600,color:'var(--red)'}}>Zeker?</span>
                          <button className="btn btn-danger btn-sm" onClick={() => { onDelete(e.id); setConfirmId(null); }}>Ja</button>
                          <button className="btn btn-ghost btn-sm" onClick={() => setConfirmId(null)}>Nee</button>
                        </div>
                      ) : (
                        <div style={{display:'flex',gap:'6px',justifyContent:'flex-end'}}>
                          <button className="btn btn-ghost btn-sm" onClick={() => { setConfirmId(null); onEdit(e); }}>Edit</button>
                          <button className="btn btn-danger btn-sm" onClick={() => setConfirmId(e.id)}>✕</button>
                        </div>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Invoice Text Generator ───────────────────────────────────────────
function invoiceEntryText(e) {
  const d = new Date(e.date + 'T12:00:00');
  const dayNL = DUTCH_DAYS[d.getDay()];
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  const vessel = e.vessel || '';
  const location = e.location || e.comment || '';
  return `${dayNL} ${dd}/${mm}/${yyyy}\n${vessel} ${e.jobType} bij ${location}\n[${e.startTime} - ${e.endTime}]`;
}

function InvoiceSection({ title, entries, accentColor }) {
  const [copied, setCopied] = useState(false);
  const text = entries.map(invoiceEntryText).join('\n\n');

  function copy() {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2200);
    });
  }

  return (
    <div style={{
      background:'var(--surface)',border:`1px solid ${accentColor}30`,
      borderRadius:'16px',padding:'18px 20px',
    }}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
        <div style={{fontSize:'13px',fontWeight:'700',letterSpacing:'0.4px',color:accentColor,textTransform:'uppercase'}}>{title}</div>
        <button className={`copy-btn${copied?' copied':''}`} onClick={copy} style={{borderColor:`${accentColor}40`,color:copied?'var(--green)':accentColor,background:copied?'rgba(48,209,88,0.1)':`${accentColor}10`}}>
          {copied ? '✓ Gekopieerd!' : 'Kopiëren'}
        </button>
      </div>
      <div className="invoice-box" style={{borderColor:`${accentColor}20`}}>
        {text}
      </div>
    </div>
  );
}

function InvoiceTextBox({ weekEntries }) {
  const weekday = weekEntries.filter(e => !e.isSat && !e.isSun).sort((a,b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));
  const saturday = weekEntries.filter(e => e.isSat).sort((a,b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));
  const sunday = weekEntries.filter(e => e.isSun).sort((a,b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));

}

function WeeklyKmBox({ weekEntries, weekLabel }) {
  const [copied, setCopied] = useState(false);
  const kmEntries = weekEntries.filter(e => Number(e.kmDistance) > 0);
  if (kmEntries.length === 0) return null;

  const totalOneWay  = kmEntries.reduce((s,e) => s + (Number(e.kmDistance) || 0), 0);
  const totalRound   = totalOneWay * 2;
  const totalEarnings = totalRound * 0.25;

  // group by location
  const byLoc = {};
  kmEntries.forEach(e => {
    const loc = (e.location || e.comment || 'Onbekend').trim();
    byLoc[loc] = (byLoc[loc] || 0) + (Number(e.kmDistance) || 0);

  const lines = Object.entries(byLoc)
    .map(([loc, km]) => `van Tulpenlaan 16 Schoten naar ${loc}\ntotaal ${km * 2}KM`)

  const copyText = Object.keys(byLoc).length > 1
    ? `${lines}\n\nWeek totaal: ${totalRound}KM · €${totalEarnings.toFixed(2)}`

  return (
    <div style={{marginTop:'20px'}}>
      <div style={{fontSize:'16px',fontWeight:'600',letterSpacing:'-0.3px',marginBottom:'12px'}}>

            <div style={{fontSize:'24px',fontWeight:'700',color:'var(--green)',letterSpacing:'-0.6px'}}>{fmtDec(totalEarnings)}</div>

        <div className="invoice-box" style={{borderColor:'rgba(48,209,88,0.2)',whiteSpace:'pre'}}>

// ── Weekly View ──────────────────────────────────────────────────────
function WeeklyView({ entries, settings, onAdd }) {
  const [weekOffset, setWeekOffset] = useState(0);

  const weekStart = useMemo(() => {
    const now = new Date();
    const day = now.getDay();
    const diff = day === 0 ? 6 : day - 1;
    const mon = new Date(now);
    mon.setDate(now.getDate() - diff + weekOffset * 7);
    mon.setHours(12,0,0,0);
    return mon;
  }, [weekOffset]);

  const weekDays = useMemo(() => {
    return Array.from({length: 7}, (_, i) => {
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate() + i);
      const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const dayEntries = entries.filter(e => e.date === dateStr);
      const total = dayEntries.reduce((s,e) => s + e.earningsInclVAT, 0);
      const hours = dayEntries.reduce((s,e) => s + e.totalHours, 0);
      return { date: d, dateStr, entries: dayEntries, total, hours };
    });
  }, [weekStart, entries]);

  const weekTotal = weekDays.reduce((s,d) => s + d.total, 0);
  const weekHours = weekDays.reduce((s,d) => s + d.hours, 0);
  const weekExcl = weekTotal / (1 + settings.vatRate);
  const weekVAT = weekTotal - weekExcl;

  const weekLabel = `${weekDays[0].date.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})} – ${weekDays[6].date.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}`;

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="section-title">Weekly View</div>
          <div className="section-sub">{weekLabel}</div>
        </div>
        <button className="btn btn-primary" onClick={onAdd}>+ Log Work</button>
      </div>

      <div className="stat-grid" style={{marginBottom:'20px'}}>
        <StatCard label="Week Earnings" value={fmtDec(weekTotal)} sub="Incl. VAT" badge="This Week" badgeClass="badge-gold"/>
        <StatCard label="Excl. VAT" value={fmtDec(weekExcl)} sub="Net before tax"/>
        <StatCard label="VAT" value={fmtDec(weekVAT)} sub="To set aside" accent="var(--red)"/>
        <StatCard label="Hours" value={`${fmtNum(weekHours,1)}h`} sub={`${weekDays.filter(d=>d.entries.length>0).length} days worked`}/>
      </div>

      <div className="week-nav-row" style={{display:'flex',alignItems:'center',gap:'16px',marginBottom:'16px'}}>
        <button className="week-nav-btn" onClick={() => setWeekOffset(o => o-1)}>‹</button>
        <span style={{fontSize:'14px',fontWeight:'500',color:'var(--text2)'}}>{weekLabel}</span>

// ── API client ───────────────────────────────────────────────────────
const API = {
  token: () => localStorage.getItem('omega_token'),
  hdrs:  () => ({ 'Content-Type': 'application/json', Authorization: `Bearer ${API.token()}` }),
  async call(method, url, body) {
    let res;
    try {
      res = await fetch(url, {
        method,
        headers: API.hdrs(),
        body: body != null ? JSON.stringify(body) : undefined,
      });
    } catch {
      throw new Error('Geen verbinding met de server');
    }
    if (res.status === 401) { API.logout(); return null; }
    const ct = res.headers.get('content-type') || '';
    if (!ct.includes('application/json')) throw new Error('Server gaf geen JSON terug');
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Serverfout');
    return data;
  },
  logout() { localStorage.removeItem('omega_token'); window.location.reload(); },
};

// ── Desktop install button ───────────────────────────────────────────
function NavInstallBtn() {
  const [show, setShow] = useState(!!_deferredInstallPrompt);
  useEffect(() => {
    const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
    if (isStandalone) return;
    function onPrompt(e) { e.preventDefault(); _deferredInstallPrompt = e; setShow(true); }
    window.addEventListener('beforeinstallprompt', onPrompt);
    if (_deferredInstallPrompt) setShow(true);
    return () => window.removeEventListener('beforeinstallprompt', onPrompt);
  }, []);
  if (!show) return null;
  async function install() {
    if (!_deferredInstallPrompt) return;
    await _deferredInstallPrompt.prompt();
    _deferredInstallPrompt = null;
    setShow(false);
  }
  return (
    <button className="btn btn-ghost btn-sm nav-desktop-only" onClick={install} title="Installeer als desktop app">
      💻 Installeer
    </button>
  );
}

// ── Install banner (PWA) ─────────────────────────────────────────────
function InstallBanner() {
  const [show, setShow] = useState(false);
  const [prompt, setPrompt] = useState(null); // Chrome beforeinstallprompt

  useEffect(() => {
    if (localStorage.getItem('pwa_dismissed')) return;
    const isStandalone =
      window.navigator.standalone === true ||
      window.matchMedia('(display-mode: standalone)').matches;
    if (isStandalone) return; // already installed

    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isIOS) {
      // Show after a short delay so it doesn't pop up immediately
      const t = setTimeout(() => setShow(true), 4000);
      return () => clearTimeout(t);
    }
    // Chrome / Android
    function onPrompt(e) { e.preventDefault(); setPrompt(e); setShow(true); }
    window.addEventListener('beforeinstallprompt', onPrompt);
    return () => window.removeEventListener('beforeinstallprompt', onPrompt);
  }, []);

  function dismiss() { localStorage.setItem('pwa_dismissed', '1'); setShow(false); }

  async function install() {
    if (prompt) { await prompt.prompt(); prompt.userChoice; }
    dismiss();
  }

  if (!show) return null;

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  return (
    <div className="install-banner">
      <div className="install-banner-icon">📱</div>
      <div className="install-banner-text">
        <div className="install-banner-title">Installeer Omega Tracker</div>
        {isIOS
          ? <div className="install-banner-sub">Tik op <strong>Delen</strong> ⎋ → <strong>Zet op beginscherm</strong></div>
          : <div className="install-banner-sub">Gebruik de app als native app op je telefoon</div>
        }
      </div>
      {!isIOS && <button className="install-btn" onClick={install}>Installeer</button>}
      <button className="install-dismiss" onClick={dismiss} title="Sluiten">✕</button>
    </div>
  );
}

    if (regData) applyTheme(pickTheme, pickColor);

    e.preventDefault();
    setErr(''); setBusy(true);
    try {
      const endpoint = tab === 'login' ? '/api/login' : '/api/register';
      let res;
      try {
        res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass }),
        });

      const data = await res.json();

function DraftsView({ drafts, settings, onDelete, onStart, onStop, onResume, onComplete, onEdit }) {
  const [confirmStop, setConfirmStop] = useState(null);

  function getRoundedTime() {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    let rh = h, rm = 0;
    if (m < 15) rm = 0;
    else if (m < 45) rm = 30;
    else { rm = 0; rh = (h + 1) % 24; }
    return String(rh).padStart(2,'0') + ':' + String(rm).padStart(2,'0');
  }

  if (drafts.length === 0) {
    return (
      <div className="page">
        <div className="page-header">
          <div>
            <div className="section-title">Concepten</div>
            <div className="section-sub">Onafgemaakte shifts en actieve timers</div>

        </div>
        <div className="card">
          <div className="empty">
            <div className="empty-icon">📝</div>
            <div className="empty-title">Geen concepten</div>
            <div className="empty-sub">Start een timer of sla een onvoltooid formulier op als concept.</div>
          </div>
        </div>
      </div>

  }

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="section-title">Concepten</div>
          <div className="section-sub">{drafts.length} concept{drafts.length !== 1 ? 'en' : ''}</div>
        </div>
      </div>
      <div className="draft-list">
        {[...drafts].sort((a,b) => {
          if (a.isActive && !b.isActive) return -1;
          if (!a.isActive && b.isActive) return 1;
          return (b.date || '').localeCompare(a.date || '');
        }).map(d => {
          const hours = d.startTime && d.endTime
            ? calcHours(d.startTime, d.endTime, Number(d.extraDays||0))
            : 0;
          const earn = hours > 0 ? calcEarnings(hours, d.date, settings) : null;
          const cardClass = d.isActive ? 'active' : d.endTime ? 'ready' : '';

          return (
            <div key={d.id} className={`draft-card ${cardClass}`}>
              <div className="draft-card-top">
                <div className="draft-card-info">
                  <div className="draft-card-title">
                    {d.vessel || '—'}{d.location ? ` · ${d.location}` : ''}
                  </div>
                  <div className="draft-card-meta">
                    {d.date && formatDate(d.date)} · {d.jobType}
                    {d.startTime && ` · ${d.startTime}${d.endTime ? ` → ${d.endTime}` : ' → ?'}`}
                    {earn ? ` · ${fmtDec(earn.inclVAT)} (${fmtNum(hours,1)}h)` : ''}

                </div>
                <div className={`draft-card-status ${d.isActive ? 'draft-status-active' : d.endTime ? 'draft-status-ready' : 'draft-status-incomplete'}`}>
                  {d.isActive ? '🔴 Actief' : d.endTime ? '✓ Klaar' : '⚠ Onvoltooid'}
                </div>
              </div>

              <div className="draft-card-actions">
                {d.isActive && (
                  isStopConfirm ? (
                    <>
                      <span style={{fontSize:'12px',fontWeight:600,color:'var(--text)',alignSelf:'center',whiteSpace:'nowrap'}}>
                        Stop op {getRoundedTime()}?
                      </span>
                      <button className="btn btn-danger btn-sm" onClick={() => { onStop(d.id); setConfirmStop(null); }}>✓ Stoppen</button>
                      <button className="btn btn-ghost btn-sm" onClick={() => setConfirmStop(null)}>✗ Annuleer</button>

                )}

          );
        })}

    </div>
  );

// ── Active Timer Chip ─────────────────────────────────────────────────
function ActiveTimerChip({ drafts, onStop }) {
  const activeDraft = drafts.find(d => d.isActive);
  const [elapsed, setElapsed] = useState('');
  const [confirmStop, setConfirmStop] = useState(false);

  useEffect(() => {
    if (!activeDraft) { setElapsed(''); setConfirmStop(false); return; }
    function tick() {
      if (!activeDraft.date || !activeDraft.startTime) return;
      const start = new Date(`${activeDraft.date}T${activeDraft.startTime}:00`);
      const now = new Date();
      let ms = now - start;
      if (ms < 0) ms = 0;
      const totalMin = Math.floor(ms / 60000);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      setElapsed(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    }
    tick();
    const t = setInterval(tick, 15000);
    return () => clearInterval(t);
  }, [activeDraft && activeDraft.id, activeDraft && activeDraft.startTime]);

  if (!activeDraft) return null;

  function getRoundedTime() {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    let rh = h, rm = 0;
    if (m < 15) rm = 0;
    else if (m < 45) rm = 30;
    else { rm = 0; rh = (h + 1) % 24; }
    return String(rh).padStart(2,'0') + ':' + String(rm).padStart(2,'0');
  }

  return (
    <div className="active-timer-chip">
      <div className="timer-chip-dot"/>
      <div className="timer-chip-info">
        <div className="timer-chip-label">Live Timer</div>
        <div className="timer-chip-detail">
          {activeDraft.vessel}{activeDraft.location ? ` · ${activeDraft.location}` : ''}
        </div>
      </div>
      <div className="timer-chip-elapsed">{elapsed}</div>
      {confirmStop ? (
        <div className="timer-confirm-row">
          <span className="timer-confirm-time">Stop op {getRoundedTime()}?</span>
          <button className="timer-confirm-yes" onClick={() => { onStop(activeDraft.id); setConfirmStop(false); }}>✓</button>
          <button className="timer-confirm-no" onClick={() => setConfirmStop(false)}>✗</button>
        </div>
      ) : (
        <button className="timer-stop-btn" onClick={() => setConfirmStop(true)}>■ Stop</button>
      )}
    </div>
  );
}

// ── Image compression helper ─────────────────────────────────────────
function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX = 1024;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.82));
    };
    img.src = url;
  });
}

// ── Time formatter (social) ──────────────────────────────────────────
function fmtAgo(ts) {
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 55)     return 'Zojuist';
  if (diff < 3600)   return `${Math.floor(diff/60)}m geleden`;
  if (diff < 86400)  return `${Math.floor(diff/3600)}u geleden`;
  const d = new Date(ts);
  return d.toLocaleDateString('nl-BE', { day:'numeric', month:'short' });
}
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('nl-BE', { hour:'2-digit', minute:'2-digit' });
}

        <div className="chat-text">{msg.content}</div>
        <div className="chat-time">{fmtTime(msg.created_at)}</div>
      </div>
    </div>
  );
}

// ── SocialPage ───────────────────────────────────────────────────────
function SocialPage({ currentUser, onUnreadChange }) {
  const [sub, setSub]               = useState('feed');
  // Feed
  const [posts, setPosts]           = useState([]);
  const [feedOffset, setFeedOffset] = useState(0);
  const [hasMore, setHasMore]       = useState(true);
  const [compose, setCompose]       = useState(false);
  const [postText, setPostText]     = useState('');
  const [postImg, setPostImg]       = useState(null);
  const [posting, setPosting]       = useState(false);
  // Group chat
  const [groupMsgs, setGroupMsgs]   = useState([]);
  const lastGroupId                 = useRef(0);
  const [groupInput, setGroupInput] = useState('');
  const groupEnd                    = useRef(null);
  // DMs
  const [users, setUsers]           = useState([]);
  const [activeDM, setActiveDM]     = useState(null);
  const [dmMsgs, setDmMsgs]         = useState([]);
  const lastDMId                    = useRef(0);
  const [dmInput, setDmInput]       = useState('');
  const dmEnd                       = useRef(null);
  const [unread, setUnread]         = useState({});

  // ── Unread polling ──────────────────────────────────────────────
  useEffect(() => {
    function load() {
      API.call('GET', '/api/chat/unread').then(rows => {
        if (!Array.isArray(rows)) return;
        const map = {};
        rows.forEach(r => { map[r.from_user_id] = r.count; });
        setUnread(map);
        if (onUnreadChange) onUnreadChange(rows.reduce((s, r) => s + r.count, 0));
      }).catch(() => {});
    }
    load();
    const t = setInterval(load, 15000);
    return () => clearInterval(t);
  }, []);

  // ── Load users ──────────────────────────────────────────────────
  useEffect(() => {
    API.call('GET', '/api/users').then(u => { if (Array.isArray(u)) setUsers(u); }).catch(() => {});
  }, []);

  // ── Feed initial load ───────────────────────────────────────────
  useEffect(() => {
    if (sub !== 'feed') return;
    loadFeed(true);
  }, [sub]);

  // ── Group chat load + poll ──────────────────────────────────────
  useEffect(() => {
    if (sub !== 'group') return;
    API.call('GET', '/api/chat/group?after=0').then(msgs => {
      if (!Array.isArray(msgs)) return;
      setGroupMsgs(msgs);
      if (msgs.length) lastGroupId.current = msgs[msgs.length - 1].id;
      setTimeout(() => groupEnd.current && groupEnd.current.scrollIntoView({ behavior: 'auto' }), 80);
    }).catch(() => {});
    const t = setInterval(() => {
      API.call('GET', `/api/chat/group?after=${lastGroupId.current}`).then(msgs => {
        if (!Array.isArray(msgs) || !msgs.length) return;
        setGroupMsgs(prev => [...prev, ...msgs]);
        lastGroupId.current = msgs[msgs.length - 1].id;
        setTimeout(() => groupEnd.current && groupEnd.current.scrollIntoView({ behavior: 'smooth' }), 50);
      }).catch(() => {});
    }, 5000);
    return () => clearInterval(t);
  }, [sub]);

  // ── DM load + poll ──────────────────────────────────────────────
  useEffect(() => {
    if (!activeDM) return;
    lastDMId.current = 0;
    API.call('GET', `/api/chat/dm/${activeDM.id}?after=0`).then(msgs => {
      if (!Array.isArray(msgs)) return;
      setDmMsgs(msgs);
      if (msgs.length) lastDMId.current = msgs[msgs.length - 1].id;
      setTimeout(() => dmEnd.current && dmEnd.current.scrollIntoView({ behavior: 'auto' }), 80);
      setUnread(prev => { const n = {...prev}; delete n[activeDM.id]; return n; });
      if (onUnreadChange) {
        setUnread(prev => {
          const total = Object.values({...prev, [activeDM.id]: 0}).reduce((s,v)=>s+v, 0);
          onUnreadChange(total);
          return prev;
        });
      }
    }).catch(() => {});
    const t = setInterval(() => {
      API.call('GET', `/api/chat/dm/${activeDM.id}?after=${lastDMId.current}`).then(msgs => {
        if (!Array.isArray(msgs) || !msgs.length) return;
        setDmMsgs(prev => [...prev, ...msgs]);
        lastDMId.current = msgs[msgs.length - 1].id;
        setTimeout(() => dmEnd.current && dmEnd.current.scrollIntoView({ behavior: 'smooth' }), 50);
      }).catch(() => {});
    }, 5000);
    return () => clearInterval(t);
  }, [activeDM && activeDM.id]);

  function loadFeed(reset) {
    const off = reset ? 0 : feedOffset;
    API.call('GET', `/api/feed?offset=${off}&limit=20`).then(data => {
      if (!Array.isArray(data)) return;
      setPosts(prev => reset ? data : [...prev, ...data]);
      setFeedOffset(off + data.length);
      setHasMore(data.length === 20);
    }).catch(() => {});
  }

  async function submitPost() {
    if (!postText.trim() || posting) return;
    setPosting(true);
    try {
      const post = await API.call('POST', '/api/feed', { content: postText.trim(), image: postImg });
      if (post && post.id) {
        setPosts(prev => [post, ...prev]);
        setPostText(''); setPostImg(null); setCompose(false);
      }
    } finally { setPosting(false); }
  }

  async function handleLike(id) {
    const res = await API.call('POST', `/api/feed/${id}/like`);
    if (res && res.likes) setPosts(prev => prev.map(p => p.id == id ? {...p, likes: res.likes} : p));
  }

  async function handleDelete(id) {
    await API.call('DELETE', `/api/feed/${id}`);
    setPosts(prev => prev.filter(p => p.id != id));
  }

  async function handleImagePick(e) {
    const file = e.target.files[0];
    if (!file) return;
    const compressed = await compressImage(file);
    setPostImg(compressed);
    e.target.value = '';
  }

  async function sendGroup() {
    if (!groupInput.trim()) return;
    const msg = await API.call('POST', '/api/chat/group', { content: groupInput.trim() });
    if (msg && msg.id) {
      setGroupMsgs(prev => [...prev, msg]);
      lastGroupId.current = msg.id;
      setGroupInput('');
      setTimeout(() => groupEnd.current && groupEnd.current.scrollIntoView({ behavior: 'smooth' }), 50);
    }
  }

  async function sendDM() {
    if (!dmInput.trim() || !activeDM) return;
    const msg = await API.call('POST', `/api/chat/dm/${activeDM.id}`, { content: dmInput.trim() });
    if (msg && msg.id) {
      setDmMsgs(prev => [...prev, msg]);
      lastDMId.current = msg.id;
      setDmInput('');
      setTimeout(() => dmEnd.current && dmEnd.current.scrollIntoView({ behavior: 'smooth' }), 50);
    }
  }

  const totalUnread = Object.values(unread).reduce((s, v) => s + v, 0);

  return (
    <div className="social-page">
      {/* Sub-tab bar */}
      <div className="social-tabs">
        {[['feed','📰 Feed'],['group','💬 Groep'],['dm','✉️ Berichten']].map(([t, label]) => (
          <button key={t} className={`social-tab${sub===t?' active':''}`} onClick={() => { setSub(t); if(t!=='dm') setActiveDM(null); }}>
            {label}
            {t === 'dm' && totalUnread > 0 && <span className="tab-badge" style={{position:'relative',top:'-1px',marginLeft:'6px'}}>{totalUnread}</span>}
          </button>
        ))}
      </div>

      <div className="social-inner">
        {/* ── Feed ── */}
        {sub === 'feed' && (
          <div className="feed-wrap">
            <button className="btn btn-primary" style={{marginBottom:'14px',width:'100%'}} onClick={() => setCompose(s => !s)}>
              {compose ? '✕ Annuleren' : '✏️ Nieuw bericht plaatsen'}
            </button>
            {compose && (
              <div className="feed-compose">
                <textarea className="feed-compose-textarea" rows={3}
                  placeholder="Wat wil je delen met je collega's?"
                  value={postText} onChange={e => setPostText(e.target.value)}/>
                {postImg && (
                  <div style={{position:'relative',marginBottom:'10px'}}>
                    <img src={postImg} style={{maxWidth:'100%',maxHeight:'180px',borderRadius:'10px',display:'block'}}/>
                    <button onClick={() => setPostImg(null)} style={{position:'absolute',top:'6px',right:'6px',background:'rgba(0,0,0,.65)',border:'none',color:'#fff',borderRadius:'50%',width:'26px',height:'26px',cursor:'pointer',fontSize:'13px',lineHeight:'1'}}>✕</button>
                  </div>
                )}
                <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                  <label className="btn btn-ghost btn-sm" style={{cursor:'pointer'}}>
                    📷 Foto
                    <input type="file" accept="image/*" style={{display:'none'}} onChange={handleImagePick}/>
                  </label>
                  <button className="btn btn-primary btn-sm" onClick={submitPost} disabled={!postText.trim() || posting}>
                    {posting ? '…' : 'Plaatsen'}
                  </button>
                </div>
              </div>
            )}
            {posts.map(p => <FeedPost key={p.id} post={p} myId={currentUser.id} onLike={handleLike} onDelete={handleDelete}/>)}
            {hasMore && posts.length > 0 && (
              <button className="btn btn-ghost" style={{width:'100%',marginTop:'4px'}} onClick={() => loadFeed(false)}>Meer laden</button>
            )}
            {posts.length === 0 && (
              <div className="feed-empty"><div className="feed-empty-icon">📰</div>Nog geen berichten. Wees de eerste!</div>
            )}
          </div>
        )}

        {/* ── Group chat ── */}
        {sub === 'group' && (
          <div className="chat-outer">
            <div className="chat-messages">
              {groupMsgs.length === 0 && (
                <div style={{textAlign:'center',padding:'40px',color:'var(--text2)'}}>Nog geen berichten. Zeg hallo! 👋</div>
              )}
              {groupMsgs.map(m => <ChatMessage key={m.id} msg={m} myId={currentUser.id}/>)}
              <div ref={groupEnd}/>
            </div>
            <div className="chat-input-bar">
              <input className="chat-input" placeholder="Stuur een bericht…"
                value={groupInput} onChange={e => setGroupInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendGroup(); }}}/>
              <button className="chat-send-btn" onClick={sendGroup} disabled={!groupInput.trim()}>➤</button>
            </div>
          </div>
        )}

        {/* ── Direct messages ── */}
        {sub === 'dm' && !activeDM && (
          <div className="dm-list">
            <div style={{fontSize:'13px',color:'var(--text2)',marginBottom:'12px'}}>Kies een collega om te berichten:</div>
            {users.length === 0 && <div style={{color:'var(--text2)',textAlign:'center',padding:'32px'}}>Nog geen andere gebruikers.</div>}
            {users.map(u => (
              <div key={u.id} className="dm-user-row" onClick={() => { setActiveDM(u); setDmMsgs([]); }}>
                <div className="dm-av">{u.username[0].toUpperCase()}</div>
                <div className="dm-user-name">{u.username}</div>
                {unread[u.id] > 0 && <span className="tab-badge">{unread[u.id]}</span>}
              </div>
            ))}
          </div>
        )}
        {sub === 'dm' && activeDM && (
          <div className="chat-outer">
            <div className="dm-back-bar">
              <button className="btn btn-ghost btn-sm" onClick={() => setActiveDM(null)}>← Terug</button>
              <div className="dm-back-name">{activeDM.username}</div>
            </div>
            <div className="chat-messages">
              {dmMsgs.length === 0 && (
                <div style={{textAlign:'center',padding:'40px',color:'var(--text2)'}}>Stuur het eerste bericht! 💬</div>
              )}
              {dmMsgs.map(m => <ChatMessage key={m.id} msg={m} myId={currentUser.id}/>)}
              <div ref={dmEnd}/>
            </div>
            <div className="chat-input-bar">
              <input className="chat-input" placeholder={`Bericht aan ${activeDM.username}…`}
                value={dmInput} onChange={e => setDmInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendDM(); }}}/>
              <button className="chat-send-btn" onClick={sendDM} disabled={!dmInput.trim()}>➤</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────
function App() {
  // ── Auth state ────────────────────────────────────────────────────
  const [currentUser, setCurrentUser] = useState(() => {
    const t = localStorage.getItem('omega_token');
    if (!t) return null;
    try {
      const p = JSON.parse(atob(t.split('.')[1]));
      if (p.exp * 1000 < Date.now()) { localStorage.removeItem('omega_token'); return null; }
      return { id: p.id, username: p.username };
    } catch { localStorage.removeItem('omega_token'); return null; }
  });

  // ── Data state ────────────────────────────────────────────────────
  const [entries,    setEntries]  = useState([]);
  const [settings,   setSettings] = useState(DEF_SETTINGS);
  const [loading,    setLoading]  = useState(false);
  const [dataReady,  setDataReady]= useState(false);

  // ── UI state ──────────────────────────────────────────────────────
  const [view,         setView]         = useState('dashboard');
  const [showMobileMenu, setShowMobileMenu] = useState(false);
  const [showAdd,      setShowAdd]      = useState(false);
  const [editEntry,    setEditEntry]    = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [drafts,       setDrafts]       = useState([]);
  const [dmUnread,     setDmUnread]     = useState(0);
  const [toast,        setToast]        = useState(null);
  const toastTimer = useRef(null);

  // ── Migration offer (localStorage → server) ──────────────────────
  const [localData, setLocalData] = useState(null); // { entries, settings } from old localStorage

  // ── Load drafts from server (+ localStorage fallback) ────────────
  useEffect(() => {
    if (!currentUser) return;
    // Show cached drafts instantly while server loads
    try {
      const cached = JSON.parse(localStorage.getItem(`omega_drafts_${currentUser && currentUser.id}`) || '[]');
      if (Array.isArray(cached)) setDrafts(cached);
    } catch {}
    API.call('GET', '/api/drafts').then(d => {
      if (Array.isArray(d)) {
        setDrafts(d);
        try { localStorage.setItem(`omega_drafts_${currentUser && currentUser.id}`, JSON.stringify(d)); } catch {}
      }
    }).catch(() => {});
  }, [currentUser && currentUser.id]);

  // ── Poll server for draft updates when a timer is active ─────────
  useEffect(() => {
    if (!currentUser) return;
    const hasActive = drafts.some(d => d.isActive);
    if (!hasActive) return;
    const id = setInterval(() => {
      API.call('GET', '/api/drafts').then(d => {
        if (Array.isArray(d)) {
          setDrafts(d);
          try { localStorage.setItem(draftsKey(), JSON.stringify(d)); } catch {}
        }
      }).catch(() => {});
    }, 15000);
    return () => clearInterval(id);
  }, [currentUser && currentUser.id, drafts.some(d => d.isActive)]);

  // ── Apply theme whenever settings change ─────────────────────────
  useEffect(() => {
    applyTheme(settings.theme, settings.accentColor);
  }, [settings.theme, settings.accentColor]);

  // ── Load data on login ────────────────────────────────────────────
  useEffect(() => {
    if (!currentUser) return;
    setLoading(true);
    Promise.all([
      API.call('GET', '/api/entries'),
      API.call('GET', '/api/settings'),
    ]).then(([ents, setts]) => {
      const serverEntries = Array.isArray(ents) ? ents : [];
      if (setts && typeof setts === 'object') setSettings({ ...DEF_SETTINGS, ...setts });
      setEntries(serverEntries);

      // Check for old localStorage data to migrate (unscoped key from pre-account version)
      if (serverEntries.length > 0) {
        // User already has server data — clear any stale unscoped localStorage so
        // a newly registered account on this device never sees another user's data.
        localStorage.removeItem('omega_entries');
        localStorage.removeItem('omega_settings');
      } else if (!localStorage.getItem('omega_entries_claimed')) {
        try {
          const lsEntries  = JSON.parse(localStorage.getItem('omega_entries') || 'null');
          const lsSettings = JSON.parse(localStorage.getItem('omega_settings') || 'null');
          if (Array.isArray(lsEntries) && lsEntries.length > 0) {
            setLocalData({ entries: lsEntries, settings: lsSettings });
          }
        } catch { /* ignore */ }
      }
      setDataReady(true);
    }).catch(() => setDataReady(true))
      .finally(() => setLoading(false));
  }, [currentUser]);

  // ── Helpers ───────────────────────────────────────────────────────
  function showToast(msg, icon = '✓') {
    setToast({ msg, icon });
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2800);
  }

  function handleLogin(token, username) {
    const p = JSON.parse(atob(token.split('.')[1]));
    setCurrentUser({ id: p.id, username });
    setDataReady(false);
  }

  function handleLogout() {
    localStorage.removeItem('omega_token');
    setCurrentUser(null);
    setEntries([]);
    setDrafts([]);
    setSettings(DEF_SETTINGS);
    setDataReady(false);
  }

  // ── CRUD ──────────────────────────────────────────────────────────
  async function handleSave(entry) {
    if (editEntry && editEntry._isDraftEdit) handleDeleteDraft(editEntry.id);
    const isRealEdit = editEntry && !editEntry._isDraftEdit;
    const next = isRealEdit
      ? entries.map(e => e.id === entry.id ? entry : e)
      : [...entries, entry];
    setEntries(next);
    setShowAdd(false);
    setEditEntry(null);
    showToast(isRealEdit ? 'Entry bijgewerkt' : 'Shift gelogd!', '⚓');
    try { await API.call('POST', '/api/entries', { entries: next }); }
    catch { showToast('Opslaan mislukt — controleer verbinding', '⚠'); }
  }

  function handleEdit(entry) { setEditEntry(entry); setShowAdd(true); }

  async function handleDelete(id) {
    const next = entries.filter(e => e.id !== id);
    setEntries(next);
    showToast('Entry verwijderd', '🗑');
    try { await API.call('POST', '/api/entries', { entries: next }); }
    catch { showToast('Verwijderen mislukt', '⚠'); }
  }

  async function handleBulkDelete(ids) {
    const idSet = new Set(ids);
    const next = entries.filter(e => !idSet.has(e.id));
    setEntries(next);
    showToast(`${ids.length} entr${ids.length === 1 ? 'y' : 'ies'} verwijderd`, '🗑');
    try { await API.call('POST', '/api/entries', { entries: next }); }
    catch { showToast('Verwijderen mislukt', '⚠'); }
  }

  async function handleSaveSettings(s) {
    setSettings(s);
    showToast('Instellingen opgeslagen');
    try { await API.call('PUT', '/api/settings', s); }
    catch { showToast('Instellingen niet opgeslagen', '⚠'); }
  }

  function openAdd() { setEditEntry(null); setShowAdd(true); }

  // ── Drafts ────────────────────────────────────────────────────────
  function draftsKey() { return 'omega_drafts_' + (currentUser && currentUser.id); }
  function persistDrafts(next) {
    setDrafts(next);
    try { localStorage.setItem(draftsKey(), JSON.stringify(next)); } catch {}
    API.call('POST', '/api/drafts', { drafts: next }).catch(() => {});
  }
  function handleSaveDraft(draft) {
    let next = drafts.filter(d => d.id !== draft.id);
    if (draft.isActive) next = next.map(d => d.isActive ? { ...d, isActive: false } : d);
    persistDrafts([...next, draft]);
    setShowAdd(false);
    setEditEntry(null);
    showToast(draft.isActive ? 'Timer gestart!' : 'Concept opgeslagen', draft.isActive ? '▶' : '📝');
  }
  function handleDeleteDraft(id) {
    persistDrafts(drafts.filter(d => d.id !== id));
  }
  function handleStartDraftTimer(id) {
    persistDrafts(drafts.map(d =>
      d.id === id ? { ...d, isActive: true, endTime: '' } : { ...d, isActive: false }
    ));
  }
  function handleStopTimer(id) {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    let rh = h, rm = 0;
    if (m < 15) rm = 0;
    else if (m < 45) rm = 30;
    else { rm = 0; rh = (h + 1) % 24; }
    const endTime = `${String(rh).padStart(2,'0')}:${String(rm).padStart(2,'0')}`;
    persistDrafts(drafts.map(d => d.id === id ? { ...d, isActive: false, endTime } : d));
    showToast(`Timer gestopt: ${endTime}`, '⏹');
  }
  function handleResumeTimer(id) {
    persistDrafts(drafts.map(d =>
      d.id === id ? { ...d, isActive: true, endTime: '' } : { ...d, isActive: false }
    ));
    showToast('Timer hervat', '▶');
  }
  async function handleCompleteDraft(draft) {
    if (!draft.date || !draft.startTime || !draft.endTime || !draft.vessel) {
      showToast('Vul eerst alle velden in', '⚠'); return;
    }
    const hours = calcHours(draft.startTime, draft.endTime, Number(draft.extraDays || 0));
    if (hours <= 0) { showToast('Ongeldige tijden', '⚠'); return; }
    const earn = calcEarnings(hours, draft.date, settings);
    const entry = {
      id: uid(),
      date: draft.date,
      jobType: draft.jobType,
      vessel: draft.vessel,
      location: draft.location,
      comment: `${draft.vessel || ''} ${draft.location || ''}`.trim(),
      startTime: draft.startTime,
      endTime: draft.endTime,
      extraDays: Number(draft.extraDays || 0),
      totalHours: hours,
      earningsInclVAT: earn.inclVAT,
      earningsExclVAT: earn.exclVAT,
      isSat: earn.isSat,
      isSun: earn.isSun,
    };
    const next = [...entries, entry];
    setEntries(next);
    handleDeleteDraft(draft.id);
    showToast('Shift gelogd!', '⚓');
    try { await API.call('POST', '/api/entries', { entries: next }); }
    catch { showToast('Opslaan mislukt', '⚠'); }
  }

  // ── Migrate localStorage data ─────────────────────────────────────
  async function migrateLocalData() {
    if (!localData) return;
    try {
      await API.call('POST', '/api/entries', { entries: localData.entries });
      if (localData.settings) await API.call('PUT', '/api/settings', localData.settings);
      setEntries(localData.entries);
      if (localData.settings) setSettings({ ...DEF_SETTINGS, ...localData.settings });
      localStorage.removeItem('omega_entries');
      localStorage.removeItem('omega_settings');
      localStorage.setItem('omega_entries_claimed', '1');
      setLocalData(null);
      showToast(`${localData.entries.length} shifts overgezet naar je account!`, '🚢');
    } catch { showToast('Migratie mislukt', '⚠'); }
  }

  function dismissMigration() {
    localStorage.removeItem('omega_entries');
    localStorage.removeItem('omega_settings');
    localStorage.setItem('omega_entries_claimed', '1');
    setLocalData(null);
  }

  // ── Export ────────────────────────────────────────────────────────
  async function handleExport() {
    try {
      const data = await API.call('GET', '/api/export');
      if (!data) return;
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a    = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(blob),
        download: `omega-backup-${new Date().toISOString().split('T')[0]}.json`,
      });
      a.click();
      URL.revokeObjectURL(a.href);
      showToast(`Backup gedownload (${data.entries.length} shifts)`, '💾');
    } catch { showToast('Export mislukt', '⚠'); }
  }

  // ── Import ────────────────────────────────────────────────────────
  async function handleImport(file) {
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!Array.isArray(data.entries)) throw new Error('Ongeldig bestand');
      const result = await API.call('POST', '/api/import', data);
      if (!result) return;
      setEntries(data.entries);
      if (data.settings) setSettings({ ...DEF_SETTINGS, ...data.settings });
      showToast(`${data.entries.length} entries hersteld`, '📁');
    } catch (ex) {
      showToast(ex.message || 'Import mislukt', '⚠');
    }
  }

  // ── Render guards ─────────────────────────────────────────────────
  if (!currentUser) return <AuthPage onLogin={handleLogin}/>;
  if (loading && !dataReady) return <LoadingScreen/>;

  return (
    <>
      <nav className="nav">
        <div className="nav-logo">Ω Omega</div>
        <div className="nav-tabs">
          {[['dashboard','Dashboard'],['history','History'],['weekly','Weekly'],['stats','Stats'],['drafts','Concepts'],['social','Sociaal']].map(([v,l]) => (
            <div key={v} className="nav-tab-rel">
              <button className={`nav-tab${view===v?' active':''}`} onClick={() => setView(v)}>{l}</button>
              {v === 'drafts' && drafts.length > 0 && <span className="tab-badge">{drafts.length}</span>}
              {v === 'social' && dmUnread > 0 && <span className="tab-badge">{dmUnread}</span>}
            </div>
          ))}
        </div>
        <div className="nav-right" style={{gap:'8px'}}>
          <button
            className="theme-nav-btn"
            title={settings.theme === 'dark' ? 'Licht thema' : 'Donker thema'}
            onClick={() => handleSaveSettings({ ...settings, theme: settings.theme === 'dark' ? 'light' : 'dark' })}
          >
            {settings.theme === 'dark' ? '☀️' : '🌙'}
          </button>
          <span className="nav-user nav-desktop-only">👤 {currentUser.username}</span>
          <NavInstallBtn/>
          <button className="btn btn-ghost btn-sm nav-desktop-only" title="Download backup" onClick={handleExport}>💾 Backup</button>
          <label className="nav-file-btn nav-desktop-only" title="Herstel vanuit backup">
            📁 Herstel
            <input type="file" accept=".json" style={{display:'none'}}
              onChange={e => { if (e.target.files[0]) handleImport(e.target.files[0]); e.target.value = ''; }}/>
          </label>
          <button className="btn btn-ghost btn-sm nav-desktop-only" onClick={() => setShowSettings(true)}>⚙ Instellingen</button>
          <button className="btn btn-primary btn-sm nav-desktop-only" onClick={openAdd}>+ Log Shift</button>
          <button className="btn btn-danger btn-sm nav-desktop-only" onClick={handleLogout} title="Uitloggen">Logout</button>
          {/* Mobile hamburger */}
          <button
            className={`hamburger-btn${showMobileMenu ? ' open' : ''}`}
            onClick={() => setShowMobileMenu(m => !m)}
            aria-label="Menu"
          >
            <span/><span/><span/>
          </button>
        </div>
      </nav>

      {/* ── Mobile menu ─────────────────────────────────────────── */}
      {showMobileMenu && (
        <div className="mobile-menu" onClick={e => { if (e.target === e.currentTarget) setShowMobileMenu(false); }}>
          <div className="mobile-menu-inner">
            <div className="mobile-menu-tabs">
              {[['dashboard','🏠','Dashboard'],['history','📋','History'],['weekly','📅','Weekly'],['stats','📊','Stats'],['drafts','📝','Concepts'],['social','💬','Sociaal']].map(([v,icon,l]) => (
                <button key={v}
                  className={`mobile-menu-tab${view===v?' active':''}`}
                  onClick={() => { setView(v); setShowMobileMenu(false); }}>
                  <span>{icon}</span>{l}
                  {v==='drafts'&&drafts.length>0?` (${drafts.length})`:''}
                  {v==='social'&&dmUnread>0?` (${dmUnread})`:''}
                </button>
              ))}
            </div>
            <div className="mobile-menu-divider"/>
            <div className="mobile-menu-actions">
              <button className="mobile-menu-action" onClick={() => { openAdd(); setShowMobileMenu(false); }}>
                <span>⚓</span> Log Shift
              </button>
              <button className="mobile-menu-action" onClick={() => { setShowSettings(true); setShowMobileMenu(false); }}>
                <span>⚙</span> Instellingen
              </button>
              <button className="mobile-menu-action" onClick={() => { handleExport(); setShowMobileMenu(false); }}>
                <span>💾</span> Backup downloaden
              </button>
              <label className="mobile-menu-action" style={{cursor:'pointer'}}>
                <span>📁</span> Herstel vanuit backup
                <input type="file" accept=".json" style={{display:'none'}}
                  onChange={e => { if (e.target.files[0]) { handleImport(e.target.files[0]); e.target.value = ''; setShowMobileMenu(false); }}}/>
              </label>
            </div>
            <div className="mobile-menu-divider"/>
            <div style={{padding:'4px 0 0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:'13px',color:'var(--text2)',paddingLeft:'16px'}}>👤 {currentUser.username}</span>
              <button className="mobile-menu-action danger" style={{width:'auto',paddingRight:'16px'}} onClick={() => { handleLogout(); setShowMobileMenu(false); }}>
                Uitloggen
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Migration banner ────────────────────────────────────── */}
      {localData && (
        <div style={{
          position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',
          background:'linear-gradient(135deg,#1a1000,#0d0800)',
          border:'1px solid rgba(240,165,0,0.5)',borderRadius:'18px',
          padding:'16px 22px',zIndex:350,
          boxShadow:'0 8px 48px rgba(240,165,0,0.2)',
          display:'flex',alignItems:'center',gap:'16px',
          animation:'slideInCard .3s ease',maxWidth:'480px',width:'calc(100% - 40px)',
        }}>
          <span style={{fontSize:'28px'}}>🚢</span>
          <div style={{flex:1}}>
            <div style={{fontSize:'14px',fontWeight:'700',color:'var(--gold)',marginBottom:'2px'}}>
              {localData.entries.length} shifts gevonden in oude opslag
            </div>
            <div style={{fontSize:'12px',color:'var(--text2)'}}>
              Zet ze over naar je account zodat je niets kwijt bent.
            </div>
          </div>
          <div style={{display:'flex',gap:'8px',flexShrink:0}}>
            <button
              onClick={migrateLocalData}
              style={{padding:'8px 16px',borderRadius:'10px',border:'none',background:'var(--gold)',color:'#000',fontSize:'13px',fontWeight:'700',cursor:'pointer'}}>
              Overzetten
            </button>
            <button
              onClick={dismissMigration}
              style={{padding:'8px 12px',borderRadius:'10px',border:'1px solid var(--border2)',background:'transparent',color:'var(--text2)',fontSize:'13px',cursor:'pointer'}}>
              Negeren
            </button>
          </div>
        </div>
      )}

      {view === 'dashboard' && <Dashboard entries={entries} settings={settings} onAdd={openAdd}/>}
      {view === 'history'   && <HistoryView entries={entries} onAdd={openAdd} onEdit={handleEdit} onDelete={handleDelete} onBulkDelete={handleBulkDelete}/>}
      {view === 'weekly'    && <WeeklyView entries={entries} settings={settings} onAdd={openAdd}/>}
      {view === 'stats'     && <StatsView entries={entries} settings={settings}/>}
      {view === 'drafts'    && (
        <DraftsView
          drafts={drafts}
          settings={settings}
          onDelete={handleDeleteDraft}
          onStart={handleStartDraftTimer}
          onStop={handleStopTimer}
          onResume={handleResumeTimer}
          onComplete={handleCompleteDraft}
          onEdit={d => { setEditEntry({ ...d, _isDraftEdit: true }); setShowAdd(true); }}
        />
      )}
      {view === 'social' && <SocialPage currentUser={currentUser} onUnreadChange={setDmUnread}/>}
      <ActiveTimerChip drafts={drafts} onStop={handleStopTimer}/>

      {showAdd && (
        <AddEntryModal
          onClose={() => { setShowAdd(false); setEditEntry(null); }}
          onSave={handleSave}
          onSaveDraft={handleSaveDraft}
          settings={settings}
          editEntry={editEntry}
        />
      )}
      {showSettings && (
        <SettingsModal
          settings={settings}
          onClose={() => setShowSettings(false)}
          onSave={s => { handleSaveSettings(s); setShowSettings(false); }}
        />
      )}
      <InstallBanner/>
      {toast && <Toast msg={toast.msg} icon={toast.icon}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
