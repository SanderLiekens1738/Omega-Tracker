<!DOCTYPE html>
<html lang="nl-BE">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ω Omega Tracker</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  /* ── Dark (default) ── */
  --bg:#000;--bg2:#0a0a0a;--bg3:#111;
  --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f5f5f7;--text2:rgba(245,245,247,0.55);--text3:rgba(245,245,247,0.35);
  --gold:#f0a500;--gold2:#ffd060;
  --green:#30d158;--blue:#0a84ff;--red:#ff453a;--purple:#bf5af2;
  --nav-bg:rgba(0,0,0,0.75);--modal-bg:#141414;--input-bg:rgba(255,255,255,0.05);
  --scrollbar:rgba(255,255,255,0.15);
  --font:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Segoe UI',sans-serif;
}
/* ── Light mode ─────────────────────────────────────────────── */
html[data-theme="light"]{
  --bg:#f2f2f7;--bg2:#ffffff;--bg3:#e5e5ea;
  --surface:rgba(0,0,0,0.04);--surface2:rgba(0,0,0,0.08);
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1c1c1e;--text2:rgba(60,60,67,0.65);--text3:rgba(60,60,67,0.38);
  --green:#34c759;--blue:#007aff;--red:#ff3b30;--purple:#af52de;
  --nav-bg:rgba(242,242,247,0.82);--modal-bg:#ffffff;--input-bg:rgba(0,0,0,0.04);
  --scrollbar:rgba(0,0,0,0.18);
}
/* Light-mode specific overrides */
html[data-theme="light"] .nav{border-bottom-color:rgba(0,0,0,0.1)}
html[data-theme="light"] .modal{box-shadow:0 20px 80px rgba(0,0,0,0.18)}
html[data-theme="light"] .card{box-shadow:0 2px 12px rgba(0,0,0,0.06)}
html[data-theme="light"] .stat-card{box-shadow:0 2px 12px rgba(0,0,0,0.06)}
html[data-theme="light"] .week-day{box-shadow:0 1px 6px rgba(0,0,0,0.05)}
html[data-theme="light"] .toast{background:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
html[data-theme="light"] .milestone-toast{background:linear-gradient(135deg,#fff8e6,#fff3cc)}
html[data-theme="light"] .auth-card{background:#fff;box-shadow:0 20px 80px rgba(0,0,0,0.12)}
html[data-theme="light"] .invoice-box{background:#f8f8fa}
html[data-theme="light"] ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.18)}
html[data-theme="light"] .nav-logo{background:linear-gradient(135deg,#1c1c1e 40%,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
html[data-theme="light"] .loading-omega{background:linear-gradient(135deg,#1c1c1e 40%,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
html[data-theme="light"] .auth-logo{background:linear-gradient(135deg,#1c1c1e 40%,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
html[data-theme="light"] .fun-badge.badge-fire{background:rgba(255,149,0,0.08)}
html[data-theme="light"] .fun-badge.badge-level{background:rgba(175,82,222,0.08)}
html[data-theme="light"] .fun-badge.badge-record{background:rgba(52,199,89,0.08)}
html[data-theme="light"] .fun-badge.badge-ship{background:rgba(0,122,255,0.08)}

html{scroll-behavior:smooth}
input[type="time"]::-webkit-datetime-edit-ampm-field{display:none !important;width:0;overflow:hidden}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  background:var(--nav-bg);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-size:20px;font-weight:700;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#fff 40%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;cursor:default;user-select:none;
}
.nav-tabs{display:flex;gap:2px;background:var(--surface);border-radius:10px;padding:3px}
.nav-tab{
  padding:5px 16px;border-radius:7px;border:none;background:transparent;
  color:var(--text2);font-size:13px;font-family:var(--font);font-weight:500;
  cursor:pointer;transition:all .2s;letter-spacing:-0.1px;
}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{background:var(--surface2);color:var(--text)}
.nav-right{display:flex;align-items:center;gap:12px}
.btn{
  padding:7px 18px;border-radius:20px;border:none;
  font-size:13px;font-family:var(--font);font-weight:600;
  cursor:pointer;transition:all .18s;letter-spacing:-0.1px;
}
.btn-primary{
  background:var(--gold);color:#000;
  box-shadow:0 0 20px rgba(240,165,0,0.25);
}
.btn-primary:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 4px 24px rgba(240,165,0,0.4)}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:rgba(255,69,58,0.15);color:var(--red);border:1px solid rgba(255,69,58,0.2)}
.btn-danger:hover{background:rgba(255,69,58,0.25)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:14px}

/* LAYOUT */
.page{padding:80px 32px 48px;max-width:1200px;margin:0 auto}
.section-title{font-size:28px;font-weight:700;letter-spacing:-0.8px;margin-bottom:6px}
.section-sub{font-size:14px;color:var(--text2);margin-bottom:28px}

/* HERO GRID */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:18px;
  padding:22px 24px 20px;transition:all .25s;cursor:default;
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;inset:0;border-radius:18px;
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 60%);
  pointer-events:none;
}
.stat-card:hover{transform:translateY(-3px);border-color:var(--border2);background:var(--surface2);box-shadow:0 12px 40px rgba(0,0,0,0.5)}
.stat-label{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:10px}
.stat-value{font-size:32px;font-weight:700;letter-spacing:-1.5px;line-height:1}
.stat-sub{font-size:12px;color:var(--text3);margin-top:8px}
.stat-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;margin-top:8px;
}
.badge-gold{background:rgba(240,165,0,0.15);color:var(--gold)}
.badge-green{background:rgba(48,209,88,0.12);color:var(--green)}
.badge-blue{background:rgba(10,132,255,0.12);color:var(--blue)}
.badge-purple{background:rgba(191,90,242,0.12);color:var(--purple)}
.badge-red{background:rgba(255,69,58,0.12);color:var(--red)}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
@media(max-width:768px){.two-col{grid-template-columns:1fr}}
.three-col{display:grid;grid-template-columns:360px 1fr;gap:14px;margin-bottom:28px}
@media(max-width:900px){.three-col{grid-template-columns:1fr}}

/* CARD */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:24px;position:relative;overflow:hidden;
}
.card-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;margin-bottom:16px;color:var(--text)}
.card-title span{color:var(--text2);font-weight:400;font-size:13px;margin-left:8px}

/* GOAL RING */
.goal-ring-wrap{display:flex;align-items:center;gap:28px}
.ring-svg{flex-shrink:0}
.ring-stats{flex:1}
.ring-stat{margin-bottom:14px}
.ring-stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px}
.ring-stat-value{font-size:22px;font-weight:700;letter-spacing:-0.8px}
.ring-stat-sub{font-size:12px;color:var(--text3);margin-top:2px}
.progress-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .6s ease}

/* CHART */
.chart-wrap{display:flex;align-items:flex-end;gap:6px;height:120px;padding-bottom:24px;position:relative}
.chart-bar-group{display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;position:relative;height:100%}
.chart-bar-inner{display:flex;gap:2px;align-items:flex-end;width:100%;height:calc(100% - 20px)}
.chart-bar{
  flex:1;border-radius:4px 4px 0 0;min-height:2px;
  transition:height .5s ease;cursor:default;
  position:relative;
}
.chart-bar.weekday{background:linear-gradient(180deg,var(--gold),rgba(240,165,0,0.6))}
.chart-bar.weekend{background:linear-gradient(180deg,var(--blue),rgba(10,132,255,0.6))}
.chart-bar:hover::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:rgba(30,30,30,0.95);color:#fff;font-size:11px;padding:4px 8px;border-radius:6px;
  white-space:nowrap;pointer-events:none;z-index:10;border:1px solid var(--border2);
}
.chart-month-label{font-size:10px;color:var(--text3);margin-top:6px;text-align:center;position:absolute;bottom:0;width:100%}
.chart-legend{display:flex;gap:16px;margin-bottom:16px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:2px}

/* ENTRY TABLE */
.entry-table{width:100%;border-collapse:collapse}
.entry-table th{
  font-size:11px;color:var(--text3);font-weight:500;letter-spacing:0.4px;
  text-transform:uppercase;padding:0 12px 10px;text-align:left;
}
.entry-table td{
  padding:11px 12px;font-size:13px;border-top:1px solid var(--border);
  vertical-align:middle;
}
.entry-table tr:hover td{background:var(--surface)}
.entry-table tr:first-child td{border-top:none}
.job-tag{
  display:inline-flex;align-items:center;padding:3px 9px;border-radius:10px;
  font-size:11px;font-weight:600;letter-spacing:0.2px;
}
.job-lossen{background:rgba(48,209,88,0.1);color:var(--green)}
.job-laden{background:rgba(10,132,255,0.1);color:var(--blue)}
.day-tag{font-size:11px;color:var(--text2);font-weight:500}
.entry-earnings{font-size:14px;font-weight:600;letter-spacing:-0.3px}
.entry-earnings.weekend{color:var(--gold)}
.entry-hours{font-size:13px;color:var(--text2)}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:#141414;border:1px solid var(--border2);border-radius:24px;
  padding:32px;width:100%;max-width:520px;
  animation:slideUp .2s ease;
  box-shadow:0 40px 100px rgba(0,0,0,0.8);
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:22px;font-weight:700;letter-spacing:-0.6px;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:0.2px;text-transform:uppercase}
.input{
  background:rgba(255,255,255,0.05);border:1px solid var(--border2);
  border-radius:10px;padding:10px 14px;color:var(--text);
  font-size:14px;font-family:var(--font);outline:none;
  transition:border-color .15s;width:100%;
}
.input:focus{border-color:var(--gold)}
.input option{background:#1a1a1a;color:#fff}
.calc-preview{
  background:rgba(240,165,0,0.06);border:1px solid rgba(240,165,0,0.15);
  border-radius:12px;padding:14px 16px;margin-top:4px;
}
.calc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px}
.calc-row:last-child{margin-bottom:0;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06);font-weight:600;font-size:15px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}

/* HISTORY FILTER */
.filter-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-select{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:7px 12px;color:var(--text);
  font-size:13px;font-family:var(--font);outline:none;cursor:pointer;
}
.filter-select:focus{border-color:var(--gold)}
.search-input{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:7px 14px;color:var(--text);
  font-size:13px;font-family:var(--font);outline:none;flex:1;min-width:180px;
}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--text3)}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.4}
.empty-title{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text)}
.empty-sub{font-size:13px;color:var(--text3)}

/* RECENT */
.recent-row{
  display:flex;align-items:center;gap:14px;padding:12px 0;
  border-bottom:1px solid var(--border);
}
.recent-row:last-child{border-bottom:none}
.recent-dot{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.recent-dot.lossen{background:rgba(48,209,88,0.1);color:var(--green)}
.recent-dot.laden{background:rgba(10,132,255,0.1);color:var(--blue)}
.recent-main{flex:1;min-width:0}
.recent-comment{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.recent-meta{font-size:11px;color:var(--text2);margin-top:2px}
.recent-amount{font-size:15px;font-weight:700;letter-spacing:-0.4px;color:var(--gold)}

/* WEEKLY */
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.week-nav{display:flex;align-items:center;gap:14px}
.week-nav-btn{
  background:var(--surface);border:1px solid var(--border2);border-radius:8px;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);transition:all .15s;font-size:16px;
}
.week-nav-btn:hover{background:var(--surface2);color:var(--text)}
.week-day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.week-day{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 8px;min-height:80px}
.week-day.has-work{border-color:rgba(240,165,0,0.25);background:rgba(240,165,0,0.04)}
.week-day-name{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px}
.week-day-date{font-size:13px;font-weight:600;margin-bottom:8px}
.week-day-entry{font-size:10px;color:var(--text2);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.week-day-earn{font-size:12px;font-weight:600;color:var(--gold);margin-top:4px}
@media(max-width:700px){.week-day-grid{grid-template-columns:repeat(4,1fr)}}

/* SETTINGS */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.setting-field{display:flex;flex-direction:column;gap:6px}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:24px 0}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1c1c1e;border:1px solid var(--border2);border-radius:14px;
  padding:12px 20px;font-size:13px;font-weight:500;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);z-index:300;
  animation:toastIn .2s ease;display:flex;align-items:center;gap:10px;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* SECTION HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.page-header-left{}

/* INVOICE TEXT */
.invoice-box{
  background:#0a0a0a;border:1px solid rgba(240,165,0,0.2);
  border-radius:12px;padding:16px 18px;margin-top:16px;
  font-family:'Courier New',Courier,monospace;font-size:12px;
  line-height:1.7;color:var(--text2);white-space:pre-wrap;word-break:break-all;
  max-height:220px;overflow-y:auto;
}
.invoice-header{color:var(--gold);font-weight:700;font-size:11px;letter-spacing:0.5px}
.copy-bar{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.copy-btn{
  background:rgba(240,165,0,0.1);border:1px solid rgba(240,165,0,0.2);
  color:var(--gold);border-radius:8px;padding:6px 14px;
  font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);
  transition:all .15s;
}
.copy-btn:hover{background:rgba(240,165,0,0.2)}
.copy-btn.copied{background:rgba(48,209,88,0.1);border-color:rgba(48,209,88,0.2);color:var(--green)}

/* GLOW accent */
.accent-glow{color:var(--gold)}

/* ── ANIMATIONS ──────────────────────────────────────────────────── */
@keyframes slideInCard{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce-in{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.07)}100%{transform:scale(1);opacity:1}}
@keyframes pulse-gold{0%,100%{filter:drop-shadow(0 0 0px rgba(240,165,0,0))}50%{filter:drop-shadow(0 0 18px rgba(240,165,0,0.75))}}
@keyframes wave-slide{0%{transform:translateX(0)}100%{transform:translateX(-80px)}}
@keyframes float-orb{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer-bg{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pop-in{0%{transform:scale(0);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes glow-ring{0%,100%{box-shadow:0 0 0 0 rgba(240,165,0,0.0)}50%{box-shadow:0 0 32px 8px rgba(240,165,0,0.22)}}

.stat-card{animation:slideInCard .5s ease both}
.stat-card:nth-child(1){animation-delay:.06s}
.stat-card:nth-child(2){animation-delay:.12s}
.stat-card:nth-child(3){animation-delay:.18s}
.stat-card:nth-child(4){animation-delay:.24s}
.stat-card:hover{animation:none}

/* ── FUN BADGES ─────────────────────────────────────────────────── */
.fun-badges-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.fun-badge{
  display:inline-flex;align-items:center;gap:7px;padding:9px 16px;
  border-radius:14px;font-size:13px;font-weight:600;border:1px solid;
  cursor:default;transition:transform .15s,box-shadow .15s;
  animation:bounce-in .5s cubic-bezier(.34,1.56,.64,1) both;
  white-space:nowrap;
}
.fun-badge:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.badge-fire{background:rgba(255,149,0,0.1);border-color:rgba(255,149,0,0.3);color:#ff9500}
.badge-fire:hover{box-shadow:0 4px 20px rgba(255,149,0,0.2)}
.badge-level{background:rgba(191,90,242,0.1);border-color:rgba(191,90,242,0.3);color:var(--purple)}

// ── Utils ────────────────────────────────────────────────────────────
const fmt = (n) => new Intl.NumberFormat('nl-BE',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
const fmtDec = (n) => new Intl.NumberFormat('nl-BE',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const fmtNum = (n,dec=1) => n.toFixed(dec);

function getDayOfWeek(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.getDay(); // 0=Sun,1=Mon,...,6=Sat
}

function calcHours(start, end, extraDays = 0) {
  if (!start || !end) return 0;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm) + extraDays * 24 * 60;
  if (extraDays === 0 && mins < 0) mins += 24 * 60; // overnight same-entry
  if (mins <= 0) return 0;
  return Math.round(mins / 30) * 0.5;
}

function calcEarnings(hours, dateStr, settings) {
  const day = getDayOfWeek(dateStr);
  const isSat = day === 6;
  const isSun = day === 0;
  const rate = isSun ? settings.sundayRate : isSat ? settings.saturdayRate : settings.weekdayRate;
  const inclVAT = hours * rate;
  const exclVAT = inclVAT / (1 + settings.vatRate);
  return { inclVAT, exclVAT, isSat, isSun, rate };
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

function getDayLabel(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ── Theme / Accent color ─────────────────────────────────────────────
const COLOR_PRESETS = [
  { name:'Goud',   hex:'#f0a500' },
  { name:'Blauw',  hex:'#0a84ff' },
  { name:'Groen',  hex:'#30d158' },
  { name:'Rood',   hex:'#ff375f' },
  { name:'Paars',  hex:'#bf5af2' },
  { name:'Oranje', hex:'#ff6b35' },
  { name:'Cyaan',  hex:'#5ac8fa' },
  { name:'Amber',  hex:'#ff9f0a' },
];

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

function lightenHex(hex, factor = 0.38) {
  const { r, g, b } = hexToRgb(hex);
  const lr = Math.min(255, Math.round(r + (255 - r) * factor));
  const lg = Math.min(255, Math.round(g + (255 - g) * factor));
  const lb = Math.min(255, Math.round(b + (255 - b) * factor));
  return '#' + [lr,lg,lb].map(x => x.toString(16).padStart(2,'0')).join('');
}

function applyTheme(theme, accentHex) {
  const html = document.documentElement;
  html.setAttribute('data-theme', theme || 'dark');
  if (accentHex) {
    html.style.setProperty('--gold',  accentHex);
    html.style.setProperty('--gold2', lightenHex(accentHex, 0.38));
    const { r, g, b } = hexToRgb(accentHex);
    html.style.setProperty('--gold-rgb', `${r},${g},${b}`);
  }
}

// Apply defaults immediately so the UI is already themed on first paint
applyTheme('dark', '#f0a500');

// ── LocalStorage hook ────────────────────────────────────────────────
function useLS(key, initial) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  const set = useCallback((v) => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      localStorage.setItem(key, JSON.stringify(next));
      return next;
    });
  }, [key]);
  return [val, set];
}

// ── Donut Chart (Weekday vs Weekend) ────────────────────────────────
function DonutChart({ weekday, weekend }) {
  const total = weekday + weekend;
  if (total === 0) {
    return (
      <div className="card" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%'}}>
        <div className="card-title">Weekday vs Weekend</div>
        <div style={{color:'var(--text3)',fontSize:'13px',padding:'20px 0'}}>No data yet</div>
      </div>
    );
  }
  const wdPct = weekday / total;
  const wePct = weekend / total;
  const r = 52, cx = 70, cy = 70, circ = 2 * Math.PI * r;
  const wdDash = wdPct * circ;
  const weDash = wePct * circ;
  return (
    <div className="card" style={{height:'100%'}}>
      <div className="card-title">Weekday vs Weekend</div>
      <div style={{display:'flex',alignItems:'center',gap:'20px'}}>
        <svg width="140" height="140" style={{flexShrink:0}}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="16"/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f0a500" strokeWidth="16"
            strokeLinecap="butt"
            strokeDasharray={`${wdDash} ${circ - wdDash}`}
            strokeDashoffset={circ * 0.25}/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#0a84ff" strokeWidth="16"
            strokeLinecap="butt"
            strokeDasharray={`${weDash} ${circ - weDash}`}
            strokeDashoffset={circ * 0.25 - wdDash}/>
          <text x={cx} y={cy - 6} textAnchor="middle" fill="#f5f5f7" fontSize="17" fontWeight="700" fontFamily="-apple-system,sans-serif">
            {(wdPct*100).toFixed(0)}%
          </text>
          <text x={cx} y={cy + 10} textAnchor="middle" fill="rgba(245,245,247,0.4)" fontSize="9" fontFamily="-apple-system,sans-serif">
            weekday
          </text>
        </svg>
        <div style={{flex:1}}>
          <div style={{marginBottom:'14px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
              <div style={{width:'10px',height:'10px',borderRadius:'3px',background:'#f0a500',flexShrink:0}}/>
              <span style={{fontSize:'12px',color:'var(--text2)'}}>Weekday</span>
            </div>
            <div style={{fontSize:'20px',fontWeight:'700',letterSpacing:'-0.5px',color:'#f0a500'}}>€{weekday.toFixed(2)}</div>
            <div style={{fontSize:'11px',color:'var(--text3)'}}>{(wdPct*100).toFixed(1)}% of total</div>
          </div>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>

// ── Confetti ─────────────────────────────────────────────────────────
function Confetti({ active }) {
  const cvRef = useRef(null);
  const rafRef = useRef(null);
  useEffect(() => {
    if (!active) return;
    const cv = cvRef.current;
    if (!cv) return;
    const ctx = cv.getContext('2d');
    cv.width = window.innerWidth;
    cv.height = window.innerHeight;
    const COLORS = ['#f0a500','#ffd060','#30d158','#0a84ff','#bf5af2','#ff453a','#ff9f0a','#ffffff','#ff375f','#5ac8fa'];
    const pts = Array.from({length: 220}, (_, i) => ({
      x: Math.random() * cv.width,
      y: -20 - Math.random() * 180,
      w: 5 + Math.random() * 9,
      h: 3 + Math.random() * 5,
      c: COLORS[i % COLORS.length],
      vx: (Math.random() - 0.5) * 6,
      vy: 1.5 + Math.random() * 3.5,
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 9,
      g: 0.05 + Math.random() * 0.07,
      a: 1,
    }));
    const tick = () => {
      ctx.clearRect(0, 0, cv.width, cv.height);
      let alive = false;
      pts.forEach(p => {
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.a -= 0.0045;
        if (p.a > 0 && p.y < cv.height + 10) alive = true;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.a);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.c;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
      if (alive) rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [active]);
  if (!active) return null;
  return <canvas ref={cvRef} style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999}}/>;
}

// ── Monthly Chart ────────────────────────────────────────────────────
function MonthlyChart({ entries }) {
  const monthly = useMemo(() => {
    return MONTHS_SHORT.map((m, mi) => {
      const monthEntries = entries.filter(e => new Date(e.date + 'T12:00:00').getMonth() === mi);
      const weekday = monthEntries.filter(e => !e.isSat && !e.isSun).reduce((s,e) => s + e.earningsInclVAT, 0);
      const weekend = monthEntries.filter(e => e.isSat || e.isSun).reduce((s,e) => s + e.earningsInclVAT, 0);
      const total = weekday + weekend;
      const hours = monthEntries.reduce((s,e) => s + e.totalHours, 0);
      return { m, weekday, weekend, total, hours };
    });
  }, [entries]);

  const maxVal = Math.max(...monthly.map(m => m.total), 1);

  return (
    <div className="card">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
        <div className="card-title" style={{marginBottom:0}}>Monthly Earnings <span>2026</span></div>
        <div className="chart-legend">
          <div className="legend-item"><div className="legend-dot" style={{background:'#f0a500'}}/> Weekday</div>
          <div className="legend-item"><div className="legend-dot" style={{background:'#0a84ff'}}/> Weekend</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'flex-end',gap:'4px',height:'140px',paddingBottom:'28px',position:'relative'}}>
        {monthly.map((m, i) => {
          const wdH = m.total > 0 ? (m.weekday / maxVal) * 112 : 0;
          const weH = m.total > 0 ? (m.weekend / maxVal) * 112 : 0;
          return (
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',height:'100%',position:'relative'}}>
              <div style={{display:'flex',gap:'2px',alignItems:'flex-end',width:'100%',height:'calc(100% - 20px)'}}>
                <div
                  className="chart-bar weekday"
                  data-tip={`Weekday: ${fmt(m.weekday)}`}
                  style={{flex:1,height:`${Math.max(wdH,m.weekday>0?3:0)}px`,borderRadius:'4px 4px 0 0',minHeight:m.weekday>0?3:0,transition:'height .5s ease',cursor:'default',position:'relative'}}
                />
                <div
                  className="chart-bar weekend"
                  data-tip={`Weekend: ${fmt(m.weekend)}`}
                  style={{flex:1,height:`${Math.max(weH,m.weekend>0?3:0)}px`,borderRadius:'4px 4px 0 0',minHeight:m.weekend>0?3:0,transition:'height .5s ease',cursor:'default',position:'relative'}}
                />
              </div>
              <div style={{position:'absolute',bottom:0,fontSize:'9px',color:m.total>0?'rgba(245,245,247,0.5)':'rgba(245,245,247,0.2)',letterSpacing:'0.2px',textAlign:'center',width:'100%'}}>
                {m.m}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Add Entry Modal ──────────────────────────────────────────────────
function AddEntryModal({ onClose, onSave, settings, editEntry }) {
  const today = (() => { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; })();
  const [form, setForm] = useState(editEntry ? {
    date: editEntry.date,
    jobType: editEntry.jobType,
    vessel: editEntry.vessel || '',
    location: editEntry.location || editEntry.comment || '',
    startTime: editEntry.startTime,
    endTime: editEntry.endTime,
    extraDays: editEntry.extraDays || 0,
  } : { date: today, jobType: 'Lossen', vessel: '', location: '', startTime: '', endTime: '', extraDays: 0 });

  const calc = useMemo(() => {
    if (!form.date || !form.startTime || !form.endTime) return null;
    const hours = calcHours(form.startTime, form.endTime, Number(form.extraDays));
    if (hours <= 0) return null;
    return { hours, ...calcEarnings(hours, form.date, settings) };
  }, [form, settings]);

  function upd(k, v) { setForm(f => ({...f, [k]: v})); }

  // compute end date label for multi-day shifts
  const endDateLabel = useMemo(() => {
    if (!form.date || Number(form.extraDays) === 0) return null;
    const d = new Date(form.date + 'T12:00:00');
    d.setDate(d.getDate() + Number(form.extraDays));
    return d.toLocaleDateString('en-GB', {weekday:'short', day:'2-digit', month:'short'});
  }, [form.date, form.extraDays]);

  function save() {
    if (!form.date || !form.startTime || !form.endTime || !form.vessel || !form.location) return;
    if (!calc) return;
    const entry = {
      id: editEntry ? editEntry.id : uid(),
      date: form.date,
      jobType: form.jobType,
      vessel: form.vessel.trim(),
      location: form.location.trim(),
      comment: `${form.vessel.trim()} ${form.location.trim()}`,
      startTime: form.startTime,
      endTime: form.endTime,
      extraDays: Number(form.extraDays),
      totalHours: calc.hours,
      earningsInclVAT: calc.inclVAT,
      earningsExclVAT: calc.exclVAT,
      isSat: calc.isSat,
      isSun: calc.isSun,
    };
    onSave(entry);
  }

  const rateName = calc ? (calc.isSun ? 'Sunday rate' : calc.isSat ? 'Saturday rate' : 'Weekday rate') : '';
  const canSave = calc && form.vessel.trim().length > 0 && form.location.trim().length > 0;

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">{editEntry ? 'Edit Entry' : 'Log Work Session'}</div>
        <div className="modal-sub">Earnings are calculated automatically. Use "Days" for shifts spanning multiple days.</div>
        <div className="form-grid">
          <div className="field">
            <label>Start Date</label>
            <input type="date" className="input" value={form.date} onChange={e => upd('date', e.target.value)}/>
          </div>
          <div className="field">
            <label>Job Type</label>
            <select className="input" value={form.jobType} onChange={e => upd('jobType', e.target.value)}>
              <option value="Lossen">Lossen (Unloading)</option>
              <option value="Laden">Laden (Loading)</option>
            </select>
          </div>
          <div className="field">
            <label>Start Time <span style={{color:'var(--text3)',fontWeight:400,textTransform:'none',fontSize:'11px'}}>HH:MM</span></label>
            <input
              type="text" className="input" placeholder="06:00"
              value={form.startTime}
              onChange={e => upd('startTime', e.target.value)}
              maxLength={5}
            />
          </div>
          <div className="field">
            <label>End Time <span style={{color:'var(--text3)',fontWeight:400,textTransform:'none',fontSize:'11px'}}>HH:MM</span></label>
            <input
              type="text" className="input" placeholder="13:00"
              value={form.endTime}
              onChange={e => upd('endTime', e.target.value)}
              maxLength={5}
            />
          </div>
          <div className="field form-full">
            <label>Days Spanned</label>
            <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
              {[0,1,2,3].map(d => (
                <button
                  key={d}
                  type="button"
                  onClick={() => upd('extraDays', d)}
                  style={{
                    padding:'8px 18px',borderRadius:'10px',border:'1px solid',cursor:'pointer',
                    fontSize:'13px',fontFamily:'var(--font)',fontWeight:'500',transition:'all .15s',
                    background: Number(form.extraDays)===d ? 'var(--gold)' : 'var(--surface)',
                    color: Number(form.extraDays)===d ? '#000' : 'var(--text2)',
                    borderColor: Number(form.extraDays)===d ? 'var(--gold)' : 'var(--border2)',
                  }}
                >
                  {d === 0 ? 'Same day' : `+${d}d`}
                </button>
              ))}
              <div style={{display:'flex',alignItems:'center',gap:'0',borderRadius:'10px',border:'1px solid var(--border2)',overflow:'hidden',background:'var(--surface)'}}>
                <button
                  type="button"
                  onClick={() => upd('extraDays', Math.max(0, Number(form.extraDays) - 1))}
                  style={{padding:'8px 13px',background:'transparent',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:'16px',fontFamily:'var(--font)',lineHeight:1}}
                >−</button>
                <input
                  type="number" min="0" max="99"
                  value={form.extraDays}
                  onChange={e => upd('extraDays', Math.max(0, parseInt(e.target.value) || 0))}
                  style={{
                    width:'40px',background:'transparent',border:'none',color:'var(--text)',
                    textAlign:'center',fontSize:'14px',fontFamily:'var(--font)',fontWeight:'600',outline:'none',
                    MozAppearance:'textfield',
                  }}
                />
                <button
                  type="button"
                  onClick={() => upd('extraDays', Number(form.extraDays) + 1)}
                  style={{padding:'8px 13px',background:'transparent',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:'16px',fontFamily:'var(--font)',lineHeight:1}}
                >+</button>
              </div>
            </div>
            {endDateLabel && (
              <div style={{marginTop:'8px',fontSize:'12px',color:'var(--gold)'}}>
                Eindigt op: {endDateLabel} om {form.endTime || '–'}
              </div>
            )}
          </div>
          <div className="field">
            <label>Vessel / Ship</label>
            <input type="text" className="input" placeholder="e.g. Antverpia 66" value={form.vessel} onChange={e => upd('vessel', e.target.value)}/>
          </div>
          <div className="field">
            <label>Location</label>
            <input type="text" className="input" placeholder="e.g. Euro-Silo Gent" value={form.location} onChange={e => upd('location', e.target.value)}/>
          </div>
        </div>
        {form.vessel && form.location && (
          <div style={{fontSize:'12px',color:'var(--text2)',padding:'8px 12px',background:'var(--surface)',borderRadius:'8px',marginTop:'4px',fontStyle:'italic'}}>
            Invoice line: <span style={{color:'var(--text)',fontStyle:'normal'}}>{form.vessel} {form.jobType} bij {form.location}</span>
          </div>
        )}

        {calc && (
          <div className="calc-preview">
            <div className="calc-row">
              <span style={{color:'var(--text2)'}}>Hours worked</span>
              <span style={{fontWeight:600}}>{fmtNum(calc.hours,1)} hrs{Number(form.extraDays)>0 ? ` (${form.startTime} → +${form.extraDays}d ${form.endTime})` : ''}</span>
            </div>
            <div className="calc-row">
              <span style={{color:'var(--text2)'}}>{rateName} ({fmtDec(calc.rate)}/hr incl. VAT)</span>
              <span style={{color:'var(--text2)'}}></span>
            </div>
            <div className="calc-row">
              <span style={{color:'var(--text2)'}}>Earnings excl. VAT</span>
              <span>{fmtDec(calc.exclVAT)}</span>
            </div>
            <div className="calc-row">
              <span style={{color:'var(--text2)'}}>VAT 21%</span>
              <span style={{color:'var(--red)'}}>{fmtDec(calc.inclVAT - calc.exclVAT)}</span>
            </div>
            <div className="calc-row">
              <span>Total (incl. VAT)</span>
              <span style={{color:'var(--gold)'}}>{fmtDec(calc.inclVAT)}</span>
            </div>
          </div>
        )}

        {!calc && form.startTime && form.endTime && (
          <div style={{padding:'10px 14px',borderRadius:'10px',background:'rgba(255,69,58,0.08)',border:'1px solid rgba(255,69,58,0.15)',fontSize:'12px',color:'var(--red)',marginTop:'4px'}}>
            Can't calculate hours — check your times or increase "Days Spanned".
          </div>
        )}

        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button
            className="btn btn-primary"
            onClick={save}
            disabled={!canSave}
            style={{opacity: canSave ? 1 : 0.4, cursor: canSave ? 'pointer' : 'not-allowed'}}
          >
            {editEntry ? 'Save Changes' : 'Log Shift'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Fun Badges ───────────────────────────────────────────────────────
function FunBadges({ entries }) {
  const { activeDays, level, levelName, bestDay, totalHours } = useMemo(() => {
    const totalHours = entries.reduce((s, e) => s + e.totalHours, 0);

    // Active days this month
    const now = new Date();
    const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const activeDays = new Set(entries.filter(e => e.date.startsWith(thisMonth)).map(e => e.date)).size;

    // Level from total hours
    let level = 1, levelName = 'Matrozenjongen';
    if (totalHours >= 500) { level = 5; levelName = 'Kapitein'; }
    else if (totalHours >= 300) { level = 4; levelName = 'Eerste Stuurman'; }
    else if (totalHours >= 150) { level = 3; levelName = 'Bootsman'; }
    else if (totalHours >= 50)  { level = 2; levelName = 'Matroos'; }

    // Best single day
    const dayMap = {};
    entries.forEach(e => { dayMap[e.date] = (dayMap[e.date] || 0) + e.earningsInclVAT; });
    const bestDay = Math.max(0, ...Object.values(dayMap));

    return { activeDays, level, levelName, bestDay, totalHours };
  }, [entries]);

  return (
    <div className="fun-badges-row">
      {activeDays > 0 && (
        <div className="fun-badge badge-fire" style={{animationDelay:'.05s'}}>
          🔥 {activeDays} dag{activeDays > 1 ? 'en' : ''} actief deze maand
        </div>
      )}
      <div className="fun-badge badge-level" style={{animationDelay:'.12s'}}>
        ⚓ Level {level} — {levelName}
      </div>
      {bestDay > 0 && (
        <div className="fun-badge badge-record" style={{animationDelay:'.19s'}}>
          🏆 Beste dag: {fmtDec(bestDay)}
        </div>
      )}
      <div className="fun-badge badge-ship" style={{animationDelay:'.26s'}}>
        ⏱ {totalHours.toFixed(1)} uur gevaren
      </div>
    </div>
  );
}

// ── Stats View ───────────────────────────────────────────────────────
function StatsView({ entries, settings }) {
  const stats = useMemo(() => {
    const weekdayE = entries.filter(e => !e.isSat && !e.isSun).reduce((s,e) => s + e.earningsInclVAT, 0);
    const satE     = entries.filter(e => e.isSat).reduce((s,e) => s + e.earningsInclVAT, 0);
    const sunE     = entries.filter(e => e.isSun).reduce((s,e) => s + e.earningsInclVAT, 0);
    const weekendE = satE + sunE;

    const vesselMap = {}, locMap = {}, dayMap = {};
    entries.forEach(e => {
      const v = e.vessel || 'Onbekend';
      if (!vesselMap[v]) vesselMap[v] = { earnings:0, hours:0, count:0 };
      vesselMap[v].earnings += e.earningsInclVAT;
      vesselMap[v].hours    += e.totalHours;
      vesselMap[v].count++;

      const l = e.location || 'Onbekend';
      if (!locMap[l]) locMap[l] = { earnings:0, hours:0, count:0 };
      locMap[l].earnings += e.earningsInclVAT;
      locMap[l].hours    += e.totalHours;
      locMap[l].count++;

      dayMap[e.date] = (dayMap[e.date] || 0) + e.earningsInclVAT;
    });

    const topVessels   = Object.entries(vesselMap).sort((a,b) => b[1].earnings - a[1].earnings).slice(0,6);
    const topLocations = Object.entries(locMap).sort((a,b) => b[1].earnings - a[1].earnings).slice(0,6);
    const sortedDays   = Object.entries(dayMap).sort((a,b) => b[1] - a[1]);
    const bestDay      = sortedDays[0] || null;

    return { weekdayE, satE, sunE, weekendE, topVessels, topLocations, bestDay, sortedDays };
  }, [entries]);

  const total = stats.weekdayE + stats.weekendE;
  const barTypes = [
    { label:'Weekdagen (Ma–Vr)', amount:stats.weekdayE, color:'var(--gold)' },
    { label:'Zaterdag',          amount:stats.satE,     color:'var(--blue)' },
    { label:'Zondag',            amount:stats.sunE,     color:'var(--purple)' },
  ];

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="section-title">Statistics</div>
          <div className="section-sub">Weekdag vs weekend · top schepen · top locaties</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px',marginBottom:'20px'}}>
        <DonutChart weekday={stats.weekdayE} weekend={stats.weekendE}/>
        <div className="card">
          <div className="card-title">Verdeling per tarief</div>
          {barTypes.map(({label, amount, color}) => {
            const pct = total > 0 ? amount / total * 100 : 0;
            return (
              <div key={label} style={{marginBottom:'20px'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}>
                  <span style={{fontSize:'13px',color:'var(--text2)'}}>{label}</span>
                  <span style={{fontSize:'13px',fontWeight:'600',color}}>
                    {fmtDec(amount)} <span style={{color:'var(--text3)',fontWeight:'400'}}>({pct.toFixed(1)}%)</span>
                  </span>
                </div>
                <div className="progress-bar" style={{height:'7px',borderRadius:'4px'}}>
                  <div className="progress-fill" style={{width:`${pct}%`,background:color,borderRadius:'4px',transition:'width .8s ease'}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px',marginBottom:'20px'}}>
        <div className="card">
          <div className="card-title">Top Schepen ⚓</div>
          {stats.topVessels.length === 0
            ? <div style={{color:'var(--text3)',fontSize:'13px'}}>Geen data</div>
            : stats.topVessels.map(([vessel, d], i) => (
              <div key={vessel} className="rank-row">
                <div className="rank-num" style={{background:'rgba(10,132,255,0.1)',color:'var(--blue)'}}>#{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'13px',fontWeight:'500',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{vessel}</div>
                  <div style={{fontSize:'11px',color:'var(--text3)'}}>{d.count} shift{d.count>1?'s':''} · {d.hours.toFixed(1)}h</div>
                </div>
                <div style={{fontSize:'13px',fontWeight:'700',color:'var(--gold)',flexShrink:0}}>{fmtDec(d.earnings)}</div>
              </div>
            ))}
        </div>
        <div className="card">
          <div className="card-title">Top Locaties 📍</div>
          {stats.topLocations.length === 0
            ? <div style={{color:'var(--text3)',fontSize:'13px'}}>Geen data</div>
            : stats.topLocations.map(([loc, d], i) => (
              <div key={loc} className="rank-row">
                <div className="rank-num" style={{background:'rgba(48,209,88,0.1)',color:'var(--green)'}}>#{i+1}</div>

      </div>

      {stats.bestDay && (

          <div className="card-title">Persoonlijke Records 🏆</div>
          <div style={{display:'flex',gap:'40px',flexWrap:'wrap'}}>

// ── History View ─────────────────────────────────────────────────────
function HistoryView({ entries, onAdd, onEdit, onDelete }) {
  const [search, setSearch] = useState('');
  const [filterMonth, setFilterMonth] = useState('all');
  const [filterType, setFilterType] = useState('all');
  const [filterWeekend, setFilterWeekend] = useState('all');

  const filtered = useMemo(() => {
    return [...entries]
      .filter(e => {
        if (filterMonth !== 'all' && new Date(e.date+'T12:00:00').getMonth() !== parseInt(filterMonth)) return false;
        if (filterType !== 'all' && e.jobType !== filterType) return false;
        if (filterWeekend === 'weekday' && (e.isSat || e.isSun)) return false;
        if (filterWeekend === 'weekend' && !e.isSat && !e.isSun) return false;
        if (search && !e.comment.toLowerCase().includes(search.toLowerCase()) && !e.date.includes(search)) return false;
        return true;
      })
      .sort((a,b) => b.date.localeCompare(a.date) || b.startTime.localeCompare(a.startTime));
  }, [entries, search, filterMonth, filterType, filterWeekend]);

  const totalFiltered = filtered.reduce((s,e) => s + e.earningsInclVAT, 0);
  const hoursFiltered = filtered.reduce((s,e) => s + e.totalHours, 0);

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="section-title">Work History</div>
          <div className="section-sub">{filtered.length} entries · {fmtNum(hoursFiltered,1)} hrs · {fmtDec(totalFiltered)}</div>
        </div>
        <button className="btn btn-primary" onClick={onAdd}>+ Log Work</button>
      </div>

      <div className="filter-row">
        <input className="search-input" placeholder="Search location or date..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="filter-select" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)}>
          <option value="all">All Months</option>
          {MONTHS_FULL.map((m,i) => <option key={i} value={i}>{m}</option>)}
        </select>
        <select className="filter-select" value={filterType} onChange={e=>setFilterType(e.target.value)}>
          <option value="all">All Types</option>
          <option value="Lossen">Lossen</option>
          <option value="Laden">Laden</option>
        </select>
        <select className="filter-select" value={filterWeekend} onChange={e=>setFilterWeekend(e.target.value)}>
          <option value="all">All Days</option>
          <option value="weekday">Weekdays</option>
          <option value="weekend">Weekends</option>
        </select>
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {filtered.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">⚓</div>
            <div className="empty-title">No entries found</div>
            <div className="empty-sub">Try adjusting your filters or log a new work session.</div>
          </div>
        ) : (
          <table className="entry-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Location / Ship</th>
                <th>Time</th>
                <th>Hours</th>
                <th>Excl. VAT</th>
                <th>Incl. VAT</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(e => {
                const exclVAT = e.earningsExclVAT || (e.earningsInclVAT / 1.21);
                return (
                  <tr key={e.id}>
                    <td>
                      <div style={{fontWeight:500}}>{formatDate(e.date)}</div>
                      <div className="day-tag">{getDayLabel(e.date)}</div>
                    </td>
                    <td>
                      <span className={`job-tag job-${e.jobType.toLowerCase()}`}>{e.jobType}</span>
                    </td>
                    <td style={{maxWidth:'220px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {e.vessel ? <><span style={{color:'var(--text)',fontWeight:500}}>{e.vessel}</span><span style={{color:'var(--text2)'}}> {e.location}</span></> : e.comment}
                    </td>
                    <td style={{color:'var(--text2)',fontSize:'12px',fontVariantNumeric:'tabular-nums'}}>
                      {e.startTime} – {e.endTime}
                    </td>
                    <td className="entry-hours">{fmtNum(e.totalHours,1)}h</td>
                    <td style={{color:'var(--text2)',fontVariantNumeric:'tabular-nums',fontSize:'13px'}}>{fmtDec(exclVAT)}</td>
                    <td className={`entry-earnings${(e.isSat||e.isSun)?' weekend':''}`} style={{fontVariantNumeric:'tabular-nums'}}>
                      {fmtDec(e.earningsInclVAT)}
                    </td>
                    <td>
                      <div style={{display:'flex',gap:'6px'}}>
                        <button className="btn btn-ghost btn-sm" onClick={() => onEdit(e)}>Edit</button>
                        <button className="btn btn-danger btn-sm" onClick={() => onDelete(e.id)}>✕</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );

// ── Invoice Text Generator ───────────────────────────────────────────
function invoiceEntryText(e) {
  const d = new Date(e.date + 'T12:00:00');
  const dayNL = DUTCH_DAYS[d.getDay()];
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  const vessel = e.vessel || '';
  const location = e.location || e.comment || '';
  return `${dayNL} ${dd}/${mm}/${yyyy}\n${vessel} ${e.jobType} bij ${location}\n[${e.startTime} - ${e.endTime}]`;
}

function InvoiceSection({ title, entries, accentColor }) {
  const [copied, setCopied] = useState(false);
  const text = entries.map(invoiceEntryText).join('\n\n');

  function copy() {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2200);
    });
  }

  return (
    <div style={{
      background:'var(--surface)',border:`1px solid ${accentColor}30`,
      borderRadius:'16px',padding:'18px 20px',
    }}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
        <div style={{fontSize:'13px',fontWeight:'700',letterSpacing:'0.4px',color:accentColor,textTransform:'uppercase'}}>{title}</div>
        <button className={`copy-btn${copied?' copied':''}`} onClick={copy} style={{borderColor:`${accentColor}40`,color:copied?'var(--green)':accentColor,background:copied?'rgba(48,209,88,0.1)':`${accentColor}10`}}>
          {copied ? '✓ Gekopieerd!' : 'Kopiëren'}
        </button>
      </div>
      <div className="invoice-box" style={{borderColor:`${accentColor}20`}}>
        {text}
      </div>
    </div>
  );
}

function InvoiceTextBox({ weekEntries }) {
  const weekday = weekEntries.filter(e => !e.isSat && !e.isSun).sort((a,b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));
  const saturday = weekEntries.filter(e => e.isSat).sort((a,b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));
  const sunday = weekEntries.filter(e => e.isSun).sort((a,b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));

  if (weekday.length === 0 && saturday.length === 0 && sunday.length === 0) return null;

  return (
    <div style={{marginTop:'20px'}}>
      <div style={{fontSize:'16px',fontWeight:'600',letterSpacing:'-0.3px',marginBottom:'12px'}}>
        Factuur tekst <span style={{fontSize:'13px',color:'var(--text2)',fontWeight:'400'}}>kopieer per tarief</span>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
        {weekday.length > 0 && <InvoiceSection title="Dagtarief (Ma – Vr)" entries={weekday} accentColor="#f0a500"/>}
        {saturday.length > 0 && <InvoiceSection title="Zaterdagtarief" entries={saturday} accentColor="#0a84ff"/>}
        {sunday.length > 0 && <InvoiceSection title="Zondagtarief" entries={sunday} accentColor="#bf5af2"/>}
      </div>
    </div>
  );
}

// ── Weekly View ──────────────────────────────────────────────────────
function WeeklyView({ entries, settings, onAdd }) {
  const [weekOffset, setWeekOffset] = useState(0);

  const weekStart = useMemo(() => {
    const now = new Date();
    const day = now.getDay();
    const diff = day === 0 ? 6 : day - 1;
    const mon = new Date(now);
    mon.setDate(now.getDate() - diff + weekOffset * 7);
    mon.setHours(12,0,0,0);
    return mon;
  }, [weekOffset]);

  const weekDays = useMemo(() => {
    return Array.from({length: 7}, (_, i) => {
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate() + i);
      const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const dayEntries = entries.filter(e => e.date === dateStr);
      const total = dayEntries.reduce((s,e) => s + e.earningsInclVAT, 0);
      const hours = dayEntries.reduce((s,e) => s + e.totalHours, 0);
      return { date: d, dateStr, entries: dayEntries, total, hours };
    });
  }, [weekStart, entries]);

  const weekTotal = weekDays.reduce((s,d) => s + d.total, 0);
  const weekHours = weekDays.reduce((s,d) => s + d.hours, 0);
  const weekExcl = weekTotal / (1 + settings.vatRate);
  const weekVAT = weekTotal - weekExcl;

  const weekLabel = `${weekDays[0].date.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})} – ${weekDays[6].date.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}`;

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="section-title">Weekly View</div>
          <div className="section-sub">{weekLabel}</div>
        </div>
        <button className="btn btn-primary" onClick={onAdd}>+ Log Work</button>
      </div>

      <div className="stat-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:'20px'}}>
        <StatCard label="Week Earnings" value={fmtDec(weekTotal)} sub="Incl. VAT" badge="This Week" badgeClass="badge-gold"/>
        <StatCard label="Excl. VAT" value={fmtDec(weekExcl)} sub="Net before tax"/>
        <StatCard label="VAT" value={fmtDec(weekVAT)} sub="To set aside" accent="var(--red)"/>
        <StatCard label="Hours" value={`${fmtNum(weekHours,1)}h`} sub={`${weekDays.filter(d=>d.entries.length>0).length} days worked`}/>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:'16px',marginBottom:'16px'}}>
        <button className="week-nav-btn" onClick={() => setWeekOffset(o => o-1)}>‹</button>
        <span style={{fontSize:'14px',fontWeight:'500',color:'var(--text2)'}}>{weekLabel}</span>
        <button className="week-nav-btn" onClick={() => setWeekOffset(o => o+1)}>›</button>
        {weekOffset !== 0 && <button className="btn btn-ghost btn-sm" onClick={() => setWeekOffset(0)}>Today</button>}
      </div>

      <div className="week-day-grid">
        {weekDays.map((d, i) => (
          <div key={i} className={`week-day${d.entries.length > 0 ? ' has-work' : ''}`}>
            <div className="week-day-name">{DAYS_FULL[i].slice(0,3)}</div>
            <div className="week-day-date" style={{color: d.date.toDateString() === new Date().toDateString() ? 'var(--gold)' : 'var(--text)'}}>
              {d.date.getDate()}
            </div>
            {d.entries.map((e,j) => (
              <div key={j}>
                <div className="week-day-entry" style={{color:'var(--text2)'}}>{e.startTime}–{e.endTime}</div>
                <div className="week-day-entry">{e.comment}</div>
              </div>
            ))}
            {d.total > 0 && <div className="week-day-earn">{fmt(d.total)}</div>}
          </div>
        ))}
      </div>

      {weekDays.some(d => d.entries.length > 0) && (
        <div className="card" style={{marginTop:'20px',padding:0,overflow:'hidden'}}>
          <table className="entry-table">
            <thead>
              <tr>
                <th>Day</th>
                <th>Type</th>
                <th>Location</th>
                <th>Time</th>
                <th>Hours</th>
                <th>Earned (incl. VAT)</th>
              </tr>
            </thead>
            <tbody>
              {weekDays.flatMap(d => d.entries.map(e => (
                <tr key={e.id}>
                  <td>
                    <div style={{fontWeight:500}}>{DAYS_FULL[new Date(e.date+'T12:00:00').getDay()===0?6:new Date(e.date+'T12:00:00').getDay()-1]}</div>
                    <div className="day-tag">{e.date.slice(5)}</div>
                  </td>
                  <td><span className={`job-tag job-${e.jobType.toLowerCase()}`}>{e.jobType}</span></td>
                  <td>{e.comment}</td>
                  <td style={{color:'var(--text2)',fontSize:'12px'}}>{e.startTime}–{e.endTime}</td>
                  <td className="entry-hours">{fmtNum(e.totalHours,1)}h</td>
                  <td className={`entry-earnings${(e.isSat||e.isSun)?' weekend':''}`}>{fmtDec(e.earningsInclVAT)}</td>
                </tr>
              )))}
            </tbody>
          </table>
        </div>
      )}
      <InvoiceTextBox weekEntries={weekDays.flatMap(d => d.entries)}/>
    </div>
  );
}

// ── API client ───────────────────────────────────────────────────────
const API = {
  token: () => localStorage.getItem('omega_token'),
  hdrs:  () => ({ 'Content-Type': 'application/json', Authorization: `Bearer ${API.token()}` }),
  async call(method, url, body) {
    let res;
    try {
      res = await fetch(url, {
        method,
        headers: API.hdrs(),
        body: body != null ? JSON.stringify(body) : undefined,
      });
    } catch {
      throw new Error('Geen verbinding met de server');
    }
    if (res.status === 401) { API.logout(); return null; }
    const ct = res.headers.get('content-type') || '';
    if (!ct.includes('application/json')) throw new Error('Server gaf geen JSON terug');
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Serverfout');
    return data;
  },
  logout() { localStorage.removeItem('omega_token'); window.location.reload(); },
};

// ── Loading Screen ───────────────────────────────────────────────────
function LoadingScreen() {
  return (
    <div className="loading-screen">
      <span className="loading-omega">Ω</span>
      <div style={{color:'var(--text3)',fontSize:'14px',letterSpacing:'0.2px'}}>Laden…</div>
    </div>
  );
}

// ── Auth Modal ───────────────────────────────────────────────────────
function AuthPage({ onLogin }) {
  const [tab, setTab]   = useState('login');
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [err,  setErr]  = useState('');
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setErr(''); setBusy(true);
    try {
      const endpoint = tab === 'login' ? '/api/login' : '/api/register';
      let res;
      try {
        res = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username: user, password: pass }) });
      } catch {
        throw new Error('Kan server niet bereiken — zorg dat je de app opent via http://localhost:3000');
      }
      const ct = res.headers.get('content-type') || '';
      if (!ct.includes('application/json')) {
        throw new Error('Verkeerde server — open de app via http://localhost:3000 (niet poort 5000 of 5173)');
      }
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      localStorage.setItem('omega_token', data.token);
      onLogin(data.token, data.username);
    } catch (ex) {
      setErr(ex.message);
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="auth-page">
      <div className="auth-card">
        <div className="auth-logo">Ω Omega</div>
        <div className="auth-tagline">Havenarbeider verdienste tracker</div>

        <div className="auth-tabs">
          <button className={`auth-tab${tab==='login'?' active':''}`} onClick={() => { setTab('login'); setErr(''); }}>Inloggen</button>
          <button className={`auth-tab${tab==='register'?' active':''}`} onClick={() => { setTab('register'); setErr(''); }}>Registreren</button>
        </div>

        {err && <div className="auth-error">⚠ {err}</div>}

        <form onSubmit={submit}>
          <div className="auth-field">
            <label className="auth-label">Gebruikersnaam</label>
            <input className="auth-input" type="text" autoComplete="username"
              placeholder="bijv. sander" value={user}
              onChange={e => setUser(e.target.value)} required/>
          </div>
          <div className="auth-field">
            <label className="auth-label">Wachtwoord</label>
            <input className="auth-input" type="password" autoComplete={tab==='login'?'current-password':'new-password'}
              placeholder={tab==='register' ? 'Minimaal 6 tekens' : '••••••••'} value={pass}
              onChange={e => setPass(e.target.value)} required/>
          </div>
          <button className="auth-submit" type="submit" disabled={busy}>
            {busy ? 'Even wachten…' : tab === 'login' ? 'Inloggen →' : 'Account aanmaken →'}
          </button>
        </form>

        <div className="auth-footer">
          {tab === 'login'
            ? <>Nog geen account? <span style={{color:'var(--gold)',cursor:'pointer'}} onClick={() => { setTab('register'); setErr(''); }}>Registreer hier</span></>
            : <>Al een account? <span style={{color:'var(--gold)',cursor:'pointer'}} onClick={() => { setTab('login'); setErr(''); }}>Log in</span></>
          }
        </div>
      </div>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────
function App() {
  // ── Auth state ────────────────────────────────────────────────────
  const [currentUser, setCurrentUser] = useState(() => {
    const t = localStorage.getItem('omega_token');
    if (!t) return null;
    try {
      const p = JSON.parse(atob(t.split('.')[1]));
      if (p.exp * 1000 < Date.now()) { localStorage.removeItem('omega_token'); return null; }
      return { id: p.id, username: p.username };
    } catch { localStorage.removeItem('omega_token'); return null; }
  });

  // ── Data state ────────────────────────────────────────────────────
  const [entries,    setEntries]  = useState([]);
  const [settings,   setSettings] = useState(DEF_SETTINGS);
  const [loading,    setLoading]  = useState(false);
  const [dataReady,  setDataReady]= useState(false);

  // ── UI state ──────────────────────────────────────────────────────
  const [view,         setView]         = useState('dashboard');
  const [showAdd,      setShowAdd]      = useState(false);
  const [editEntry,    setEditEntry]    = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [toast,        setToast]        = useState(null);
  const toastTimer = useRef(null);

  // ── Migration offer (localStorage → server) ──────────────────────
  const [localData, setLocalData] = useState(null); // { entries, settings } from old localStorage

  // ── Apply theme whenever settings change ─────────────────────────
  useEffect(() => {
    applyTheme(settings.theme, settings.accentColor);
  }, [settings.theme, settings.accentColor]);

  // ── Load data on login ────────────────────────────────────────────
  useEffect(() => {
    if (!currentUser) return;
    setLoading(true);
    Promise.all([
      API.call('GET', '/api/entries'),
      API.call('GET', '/api/settings'),
    ]).then(([ents, setts]) => {
      const serverEntries = Array.isArray(ents) ? ents : [];
      if (setts && typeof setts === 'object') setSettings({ ...DEF_SETTINGS, ...setts });
      setEntries(serverEntries);

      // Check for old localStorage data to migrate
      if (serverEntries.length === 0) {
        try {
          const lsEntries  = JSON.parse(localStorage.getItem('omega_entries') || 'null');
          const lsSettings = JSON.parse(localStorage.getItem('omega_settings') || 'null');
          if (Array.isArray(lsEntries) && lsEntries.length > 0) {
            setLocalData({ entries: lsEntries, settings: lsSettings });
          }
        } catch { /* ignore */ }
      }
      setDataReady(true);
    }).catch(() => setDataReady(true))
      .finally(() => setLoading(false));
  }, [currentUser]);

  // ── Helpers ───────────────────────────────────────────────────────
  function showToast(msg, icon = '✓') {
    setToast({ msg, icon });
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2800);
  }

  function handleLogin(token, username) {
    const p = JSON.parse(atob(token.split('.')[1]));
    setCurrentUser({ id: p.id, username });
    setDataReady(false);
  }

  function handleLogout() {
    localStorage.removeItem('omega_token');
    setCurrentUser(null);
    setEntries([]);
    setSettings(DEF_SETTINGS);
    setDataReady(false);
  }

  // ── CRUD ──────────────────────────────────────────────────────────
  async function handleSave(entry) {
    const next = editEntry
      ? entries.map(e => e.id === entry.id ? entry : e)
      : [...entries, entry];
    setEntries(next);
    setShowAdd(false);
    setEditEntry(null);
    showToast(editEntry ? 'Entry bijgewerkt' : 'Shift gelogd!', '⚓');
    try { await API.call('POST', '/api/entries', { entries: next }); }
    catch { showToast('Opslaan mislukt — controleer verbinding', '⚠'); }
  }

  function handleEdit(entry) { setEditEntry(entry); setShowAdd(true); }

  async function handleDelete(id) {
    if (!confirm('Delete this entry?')) return;
    const next = entries.filter(e => e.id !== id);
    setEntries(next);
    showToast('Entry verwijderd', '🗑');
    try { await API.call('POST', '/api/entries', { entries: next }); }
    catch { showToast('Verwijderen mislukt', '⚠'); }
  }

  async function handleSaveSettings(s) {
    setSettings(s);
    showToast('Instellingen opgeslagen');
    try { await API.call('PUT', '/api/settings', s); }
    catch { showToast('Instellingen niet opgeslagen', '⚠'); }
  }

  function openAdd() { setEditEntry(null); setShowAdd(true); }

  // ── Migrate localStorage data ─────────────────────────────────────
  async function migrateLocalData() {
    if (!localData) return;
    try {
      await API.call('POST', '/api/entries', { entries: localData.entries });
      if (localData.settings) await API.call('PUT', '/api/settings', localData.settings);
      setEntries(localData.entries);
      if (localData.settings) setSettings({ ...DEF_SETTINGS, ...localData.settings });
      // Clear old localStorage so we don't prompt again
      localStorage.removeItem('omega_entries');
      localStorage.removeItem('omega_settings');
      setLocalData(null);
      showToast(`${localData.entries.length} shifts overgezet naar je account!`, '🚢');
    } catch { showToast('Migratie mislukt', '⚠'); }
  }

  function dismissMigration() {
    localStorage.removeItem('omega_entries');
    localStorage.removeItem('omega_settings');
    setLocalData(null);
  }

  // ── Export ────────────────────────────────────────────────────────
  async function handleExport() {
    try {
      const data = await API.call('GET', '/api/export');
      if (!data) return;
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a    = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(blob),
        download: `omega-backup-${new Date().toISOString().split('T')[0]}.json`,
      });
      a.click();
      URL.revokeObjectURL(a.href);
      showToast(`Backup gedownload (${data.entries.length} shifts)`, '💾');
    } catch { showToast('Export mislukt', '⚠'); }
  }

  // ── Import ────────────────────────────────────────────────────────
  async function handleImport(file) {
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!Array.isArray(data.entries)) throw new Error('Ongeldig bestand');
      const result = await API.call('POST', '/api/import', data);
      if (!result) return;
      setEntries(data.entries);
      if (data.settings) setSettings({ ...DEF_SETTINGS, ...data.settings });
      showToast(`${data.entries.length} entries hersteld`, '📁');
    } catch (ex) {
      showToast(ex.message || 'Import mislukt', '⚠');
    }
  }

  // ── Render guards ─────────────────────────────────────────────────
  if (!currentUser) return <AuthPage onLogin={handleLogin}/>;
  if (loading && !dataReady) return <LoadingScreen/>;

  return (
    <>
      <nav className="nav">
        <div className="nav-logo">Ω Omega</div>
        <div className="nav-tabs">
          {[['dashboard','Dashboard'],['history','History'],['weekly','Weekly'],['stats','Stats']].map(([v,l]) => (
            <button key={v} className={`nav-tab${view===v?' active':''}`} onClick={() => setView(v)}>{l}</button>
          ))}
        </div>
        <div className="nav-right" style={{gap:'8px'}}>
          <button
            className="theme-nav-btn"
            title={settings.theme === 'dark' ? 'Licht thema' : 'Donker thema'}
            onClick={() => handleSaveSettings({ ...settings, theme: settings.theme === 'dark' ? 'light' : 'dark' })}
          >
            {settings.theme === 'dark' ? '☀️' : '🌙'}
          </button>
          <span className="nav-user">👤 {currentUser.username}</span>
          <button className="btn btn-ghost btn-sm" title="Download backup" onClick={handleExport}>💾 Backup</button>
          <label className="nav-file-btn" title="Herstel vanuit backup">
            📁 Herstel
            <input type="file" accept=".json" style={{display:'none'}}
              onChange={e => { if (e.target.files[0]) handleImport(e.target.files[0]); e.target.value = ''; }}/>
          </label>
          <button className="btn btn-ghost btn-sm" onClick={() => setShowSettings(true)}>⚙ Instellingen</button>
          <button className="btn btn-primary btn-sm" onClick={openAdd}>+ Log Shift</button>
          <button className="btn btn-danger btn-sm" onClick={handleLogout} title="Uitloggen">Logout</button>
        </div>
      </nav>

      {/* ── Migration banner ────────────────────────────────────── */}
      {localData && (
        <div style={{
          position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',
          background:'linear-gradient(135deg,#1a1000,#0d0800)',
          border:'1px solid rgba(240,165,0,0.5)',borderRadius:'18px',
          padding:'16px 22px',zIndex:350,
          boxShadow:'0 8px 48px rgba(240,165,0,0.2)',
          display:'flex',alignItems:'center',gap:'16px',
          animation:'slideInCard .3s ease',maxWidth:'480px',width:'calc(100% - 40px)',
        }}>
          <span style={{fontSize:'28px'}}>🚢</span>
          <div style={{flex:1}}>
            <div style={{fontSize:'14px',fontWeight:'700',color:'var(--gold)',marginBottom:'2px'}}>
              {localData.entries.length} shifts gevonden in oude opslag
            </div>
            <div style={{fontSize:'12px',color:'var(--text2)'}}>
              Zet ze over naar je account zodat je niets kwijt bent.
            </div>
          </div>
          <div style={{display:'flex',gap:'8px',flexShrink:0}}>
            <button
              onClick={migrateLocalData}
              style={{padding:'8px 16px',borderRadius:'10px',border:'none',background:'var(--gold)',color:'#000',fontSize:'13px',fontWeight:'700',cursor:'pointer'}}>
              Overzetten
            </button>
            <button
              onClick={dismissMigration}
              style={{padding:'8px 12px',borderRadius:'10px',border:'1px solid var(--border2)',background:'transparent',color:'var(--text2)',fontSize:'13px',cursor:'pointer'}}>
              Negeren
            </button>
          </div>
        </div>
      )}

      {view === 'dashboard' && <Dashboard entries={entries} settings={settings} onAdd={openAdd}/>}
      {view === 'history'   && <HistoryView entries={entries} onAdd={openAdd} onEdit={handleEdit} onDelete={handleDelete}/>}
      {view === 'weekly'    && <WeeklyView entries={entries} settings={settings} onAdd={openAdd}/>}
      {view === 'stats'     && <StatsView entries={entries} settings={settings}/>}

      {showAdd && (
        <AddEntryModal
          onClose={() => { setShowAdd(false); setEditEntry(null); }}
          onSave={handleSave}
          settings={settings}
          editEntry={editEntry}
        />
      )}
      {showSettings && (
        <SettingsModal
          settings={settings}
          onClose={() => setShowSettings(false)}
          onSave={s => { handleSaveSettings(s); setShowSettings(false); }}
        />
      )}
      {toast && <Toast msg={toast.msg} icon={toast.icon}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
